&lt;head&gt;

&lt;title&gt;עבודת קיץ בכימיה — שאלות רבות־ברירה&lt;/title&gt;
&lt;style&gt;

:root {
  --bg:#f5f7fb; --panel:#ffffff; --ink:#172033; --muted:#667085; --line:#d0d5dd;
  --primary:#1d4ed8; --primary-dark:#1e40af; --soft:#eff6ff; --good:#047857; --bad:#b42318;
  --good-bg:#ecfdf3; --bad-bg:#fef3f2; --hint-bg:#fff7ed; --hint:#9a3412; --neutral:#f2f4f7;
}
* { box-sizing:border-box; }
body { margin:0; font-family:Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); line-height:1.65; }
header { background:linear-gradient(135deg,#1d4ed8,#0f766e); color:#fff; padding:24px 16px; }
.wrap { max-width:980px; margin:0 auto; }
main { max-width:980px; margin:0 auto; padding:16px; }
h1 { margin:0 0 6px; font-size:1.7rem; }
h2 { margin:14px 0 10px; font-size:1.35rem; scroll-margin-top:12px; }
h2:focus { outline:3px solid rgba(29,78,216,.22); border-radius:8px; }
p { margin:0 0 10px; }
ul { margin-top:4px; }
.card, .question-card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; margin:16px 0; box-shadow:0 2px 12px rgba(16,24,40,.06); }
.notice { border-right:6px solid #f59e0b; background:#fffbeb; }
.info-grid { display:grid; grid-template-columns:repeat(2,minmax(220px,1fr)); gap:12px; }
label.small { display:block; color:var(--muted); font-size:.9rem; margin-bottom:4px; }
input[type="text"] { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px; font:inherit; }
.status-bar { display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center; }
#scoreBox { font-weight:bold; }
.question-card { display:none; scroll-margin-top:12px; }
.question-card.active { display:block; }
.nav-strip { display:flex; gap:10px; align-items:center; justify-content:space-between; border-radius:14px; background:#f9fafb; padding:10px; }
.bottom-nav { margin-top:18px; }
.progress-text { color:var(--muted); text-align:center; flex:1; }
button { border:0; border-radius:999px; padding:10px 16px; background:var(--primary); color:white; cursor:pointer; font:inherit; }
button:hover { background:var(--primary-dark); }
button.secondary { background:#e5e7eb; color:var(--ink); }
button.secondary:hover { background:#d0d5dd; }
.next-btn { background:var(--primary) !important; color:#fff !important; font-weight:700; padding-inline:22px; box-shadow:0 4px 12px rgba(29,78,216,.24); }
.next-btn:hover { background:var(--primary-dark) !important; }
.next-btn:disabled { box-shadow:none; }
button.light { background:#f2f4f7; color:var(--ink); border:1px solid var(--line); }
button.light:hover { background:#e4e7ec; }
button:disabled { opacity:.45; cursor:not-allowed; }
.actions { display:flex; flex-wrap:wrap; gap:10px; margin:14px 0; }
.q-text { margin-top:8px; }
.eq { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center; }
.chem { direction:ltr; display:inline-block; unicode-bidi:isolate; font-family:Arial, sans-serif; text-align:left; }
.chem sup, .chem sub { direction:ltr; unicode-bidi:isolate; }
sup, sub { line-height:0; }
.chem u { text-underline-offset:4px; text-decoration-thickness:1.5px; }
.options { display:grid; gap:10px; margin-top:16px; }
.option { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; cursor:pointer; transition:.15s ease; }
.option:hover { background:#f9fafb; }
.option input { margin-top:.35em; }
.opt-letter { font-weight:bold; min-width:1.6em; }
.option.correct-option { border-color:#86efac; background:var(--good-bg); }
.option.wrong-option { border-color:#fda29b; background:var(--bad-bg); }
.feedback { display:none; margin-top:12px; border-radius:14px; padding:12px; }
.feedback.show.correct { display:block; background:var(--good-bg); color:#065f46; border:1px solid #86efac; }
.feedback.show.incorrect { display:block; background:var(--bad-bg); color:#7a271a; border:1px solid #fda29b; }
.feedback.show.hint { display:block; background:var(--hint-bg); color:var(--hint); border:1px solid #fed7aa; }
.feedback.show.neutral { display:block; background:var(--neutral); color:#344054; border:1px solid var(--line); }
.mini-table { width:100%; border-collapse:collapse; margin:8px 0; }
.mini-table th, .mini-table td { border:1px solid var(--line); padding:7px; text-align:right; }
.mini-table th { background:#f2f4f7; }
.jump-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(76px,1fr)); gap:8px; margin-top:12px; }
.jump-btn { background:#eef2ff; color:#1e3a8a; border:1px solid #c7d2fe; }
.jump-btn.done { background:#dcfce7; color:#166534; border-color:#86efac; }
.jump-btn.current { outline:3px solid rgba(29,78,216,.22); }
.attempt-line { color:var(--muted); margin-top:8px; font-size:.95rem; }
.lewis-wrap { direction:ltr; display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin:16px auto; padding:10px; background:#fff; border:1px solid var(--line); border-radius:14px; }
.lewis { position:relative; width:105px; height:82px; }
.lewis .center { position:absolute; top:34px; left:45px; font-weight:bold; font-size:24px; }
.dot { position:absolute; width:7px; height:7px; background:#111827; border-radius:999px; }
.dot.top { top:20px; left:50px; } .dot.left { top:42px; left:22px; } .dot.right { top:42px; right:22px; } .dot.bottom { bottom:7px; left:50px; }
.dot.top1 { top:20px; left:42px; } .dot.top2 { top:20px; left:58px; } .dot.bottom1 { bottom:7px; left:42px; } .dot.bottom2 { bottom:7px; left:58px; }
.completion-toast { position:fixed; left:16px; right:16px; bottom:18px; max-width:760px; margin:auto; z-index:50; background:#ecfdf3; color:#065f46; border:1px solid #86efac; border-radius:18px; padding:14px 18px; box-shadow:0 12px 28px rgba(16,24,40,.18); display:none; }
.completion-toast.show { display:block; }
.completion-toast strong { display:block; font-size:1.05rem; margin-bottom:2px; }
.summary-table { width:100%; border-collapse:collapse; margin-top:10px; }
.summary-table th,.summary-table td { border:1px solid var(--line); padding:8px; text-align:right; }
.summary-table th { background:#f2f4f7; }
.small-muted { color:var(--muted); font-size:.92rem; }
@media (max-width:620px) {
  .info-grid { grid-template-columns:1fr; }
  .nav-strip { gap:6px; }
  button { padding:9px 12px; }
  .progress-text { font-size:.9rem; }
}
@media print {
  header,.card.status-card,.jump-card,.actions,.nav-strip { display:none !important; }
  body { background:#fff; }
  .question-card { display:block !important; box-shadow:none; break-inside:avoid; }
}

.name-warning { margin-top:6px; color:#9a3412; background:#fff7ed; border:1px solid #fed7aa; border-radius:10px; padding:7px 9px; font-size:.92rem; }
#questionContainer { min-height:520px; }
.end-panel { display:none; margin-top:16px; background:#ecfdf3; border:1px solid #86efac; color:#065f46; }

.start-row { display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
.name-error { display:none; margin-top:6px; color:var(--bad); font-weight:700; }
.name-error.show { display:block; }
.prestart-hidden { display:none !important; }
#startActivityBtn:disabled { opacity:.55; cursor:not-allowed; box-shadow:none; }

const OPEN_QUESTIONS = [];

// ===== מנגנון הפעילות =====
const totalQuestions = MC_QUESTIONS.length;
const storageKey = 'chem11_mc_three_attempts_final_v2';
const letters = ["א", "ב", "ג", "ד"];
let currentIndex = 0;
let state = {
  studentName: '',
  schoolName: '',
  answers: {},
  orders: {},
  started: false
};
let lastCommittedStudentName = '';

function questionById(qid) { return MC_QUESTIONS.find(q =&gt; q.id === qid); }
function defaultQuestionState() { return { attempts: 0, selected: null, completed: false, correct: false, finalShown: false }; }
function naturalOrder(n) { return Array.from({ length: n }, (_, i) =&gt; i); }
function hasProgress() { return Object.values(state.answers || {}).some(qs =&gt; qs &amp;&amp; (qs.attempts &gt; 0 || qs.selected !== null || qs.completed)); }
function hasValidStudentName() { return (document.getElementById('studentName')?.value || '').trim().length &gt; 0; }
function setNameError(show) {
  const err = document.getElementById('studentNameError');
  const input = document.getElementById('studentName');
  if (err) err.classList.toggle('show', !!show);
  if (input) input.setAttribute('aria-invalid', show ? 'true' : 'false');
}
function updateStartButton() {
  const btn = document.getElementById('startActivityBtn');
  if (btn) btn.disabled = !hasValidStudentName();
}
function updateActivityVisibility() {
  const started = !!state.started;
  ['.jump-card', '#questionContainer', '#summaryCard'].forEach(sel =&gt; {
    const el = document.querySelector(sel);
    if (el) el.classList.toggle('prestart-hidden', !started);
  });
  const statusBar = document.getElementById('activityStatusBar');
  if (statusBar) statusBar.classList.toggle('prestart-hidden', !started);
  const endPanel = document.getElementById('endPanel');
  if (endPanel &amp;&amp; !started) endPanel.classList.remove('show');
  updateStartButton();
}

function shuffledOrder(n, previousOrder) {
  const arr = naturalOrder(n);
  for (let i = arr.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  if (n &gt; 1 &amp;&amp; previousOrder &amp;&amp; arr.join(',') === previousOrder.join(',')) {
    [arr[0], arr[1]] = [arr[1], arr[0]];
  }
  return arr;
}

function ensureOptionOrders(forceNew = false) {
  if (!state.orders || typeof state.orders !== 'object') state.orders = {};
  MC_QUESTIONS.forEach(q =&gt; {
    const optionCount = q.options.length;
    const current = state.orders[q.id];
    const valid = Array.isArray(current) &amp;&amp; current.length === optionCount &amp;&amp; new Set(current).size === optionCount;
    if (forceNew || !valid) {
      state.orders[q.id] = shuffledOrder(optionCount, valid ? current : null);
    }
  });
}

function getQState(qid) {
  if (!state.answers[qid]) state.answers[qid] = defaultQuestionState();
  return state.answers[qid];
}

function saveState() {
  state.studentName = document.getElementById('studentName').value.trim();
  state.schoolName = document.getElementById('schoolName').value.trim();
  localStorage.setItem(storageKey, JSON.stringify(state));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
    if (saved &amp;&amp; typeof saved === 'object') state = saved;
  } catch(e) {}
  if (!state.answers || typeof state.answers !== 'object') state.answers = {};
  if (!state.orders || typeof state.orders !== 'object') state.orders = {};
  if (typeof state.started !== 'boolean') state.started = !!state.studentName || hasProgress();
  document.getElementById('studentName').value = state.studentName || '';
  document.getElementById('schoolName').value = state.schoolName || '';
  lastCommittedStudentName = state.studentName || '';
  MC_QUESTIONS.forEach(q =&gt; { if (!state.answers[q.id]) state.answers[q.id] = defaultQuestionState(); });
  ensureOptionOrders(false);
}

function renderQuestionCards() {
  const container = document.getElementById('questionContainer');
  container.innerHTML = MC_QUESTIONS.map((q, idx) =&gt; `
&lt;section class="question-card" id="card-${q.id}" data-qid="${q.id}" data-index="${idx}"&gt;
  &lt;div class="nav-strip top-nav"&gt;
    &lt;button type="button" class="prev-btn secondary"&gt;הקודמת&lt;/button&gt;
    &lt;span class="progress-text"&gt;שאלה ${idx + 1} מתוך ${totalQuestions}&lt;/span&gt;
    &lt;button type="button" class="next-btn secondary"&gt;לשאלה הבאה&lt;/button&gt;
  &lt;/div&gt;
  &lt;h2 tabindex="-1"&gt;שאלה ${idx + 1}: ${q.title}&lt;/h2&gt;
  &lt;div class="q-text"&gt;${q.stemHtml}&lt;/div&gt;
  &lt;div class="attempt-line" id="attempt-${q.id}"&gt;ניסיונות: 0 מתוך 3&lt;/div&gt;
  &lt;div class="options"&gt;&lt;/div&gt;
  &lt;div class="actions"&gt;
    &lt;button type="button" class="check-btn"&gt;בדוק שאלה זו&lt;/button&gt;
    &lt;button type="button" class="reset-q-btn light"&gt;אפס שאלה&lt;/button&gt;
  &lt;/div&gt;
  &lt;div class="feedback" id="feedback-${q.id}" role="status" aria-live="polite"&gt;&lt;/div&gt;
  &lt;div class="nav-strip bottom-nav"&gt;
    &lt;button type="button" class="prev-btn secondary"&gt;הקודמת&lt;/button&gt;
    &lt;span class="progress-text"&gt;שאלה ${idx + 1} מתוך ${totalQuestions}&lt;/span&gt;
    &lt;button type="button" class="next-btn secondary"&gt;לשאלה הבאה&lt;/button&gt;
  &lt;/div&gt;
&lt;/section&gt;`).join('');
}

function renderOptions(qid) {
  const q = questionById(qid);
  const card = document.querySelector(`[data-qid="${qid}"]`);
  if (!q || !card) return;
  const container = card.querySelector('.options');
  const order = (state.orders &amp;&amp; state.orders[qid]) || naturalOrder(q.options.length);
  container.innerHTML = order.map((originalIndex, visualIndex) =&gt; `
&lt;label class="option" data-option-index="${originalIndex}" for="${qid}_opt${originalIndex}"&gt;
  &lt;input id="${qid}_opt${originalIndex}" type="radio" name="${qid}" value="${originalIndex}"&gt;
  &lt;span class="opt-letter"&gt;${letters[visualIndex]}.&lt;/span&gt;
  &lt;span class="opt-text"&gt;${q.options[originalIndex]}&lt;/span&gt;
&lt;/label&gt;`).join('');
  container.querySelectorAll('input[type="radio"]').forEach(input =&gt; input.addEventListener('change', () =&gt; {
    const qs = getQState(qid);
    if (!qs.completed) {
      qs.selected = Number(input.value);
      saveState();
    }
  }));
}

function renderAllOptions() { MC_QUESTIONS.forEach(q =&gt; renderOptions(q.id)); }
function getCards() { return Array.from(document.querySelectorAll('.question-card')); }

function selectedLetter(qid, selectedOriginalIndex) {
  if (selectedOriginalIndex === null || selectedOriginalIndex === undefined) return '—';
  const order = state.orders &amp;&amp; state.orders[qid];
  const visualIndex = Array.isArray(order) ? order.indexOf(Number(selectedOriginalIndex)) : Number(selectedOriginalIndex);
  return visualIndex &gt;= 0 ? letters[visualIndex] : letters[Number(selectedOriginalIndex)];
}

function renderJumpGrid() {
  const grid = document.getElementById('jumpGrid');
  grid.innerHTML = '';
  MC_QUESTIONS.forEach((q, idx) =&gt; {
    const qs = getQState(q.id);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'jump-btn' + (qs.completed ? ' done' : '') + (idx === currentIndex ? ' current' : '');
    btn.textContent = String(idx + 1);
    btn.title = qs.completed ? `שאלה ${idx+1} נבדקה` : `מעבר לשאלה ${idx+1}`;
    btn.addEventListener('click', () =&gt; showQuestion(idx));
    grid.appendChild(btn);
  });
}

function showQuestion(index) {
  if (!state.started) {
    updateActivityVisibility();
    document.getElementById('studentName').focus();
    return;
  }
  const cards = getCards();
  currentIndex = Math.max(0, Math.min(index, cards.length - 1));
  cards.forEach((card, idx) =&gt; card.classList.toggle('active', idx === currentIndex));
  updateNavButtons();
  renderJumpGrid();
  scrollActiveQuestionIntoView();
}

function scrollActiveQuestionIntoView() {
  const card = getCards()[currentIndex];
  if (!card) return;
  requestAnimationFrame(() =&gt; {
    const heading = card.querySelector('h2');
    const target = heading || card;
    const y = target.getBoundingClientRect().top + window.pageYOffset - 10;
    window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
    if (heading) window.setTimeout(() =&gt; heading.focus({ preventScroll: true }), 260);
  });
}

function updateNavButtons() {
  document.querySelectorAll('.prev-btn').forEach(btn =&gt; btn.disabled = currentIndex === 0);
  document.querySelectorAll('.next-btn').forEach(btn =&gt; btn.disabled = currentIndex === totalQuestions - 1);
}

function renderQuestion(qid) {
  const card = document.querySelector(`[data-qid="${qid}"]`);
  const q = questionById(qid);
  const qs = getQState(qid);
  if (!card || !q) return;
  card.querySelectorAll('input[type="radio"]').forEach(input =&gt; {
    input.checked = String(qs.selected) === input.value;
    input.disabled = qs.completed;
  });
  card.querySelectorAll('.option').forEach(opt =&gt; opt.classList.remove('correct-option', 'wrong-option'));
  if (qs.completed) {
    card.querySelectorAll('.option').forEach(opt =&gt; {
      const idx = Number(opt.dataset.optionIndex);
      if (idx === q.correct) opt.classList.add('correct-option');
      if (!qs.correct &amp;&amp; idx === qs.selected &amp;&amp; idx !== q.correct) opt.classList.add('wrong-option');
    });
  }
  const attempt = document.getElementById(`attempt-${qid}`);
  attempt.textContent = `ניסיונות: ${qs.attempts} מתוך 3${qs.completed ? ' · השאלה הושלמה' : ''}`;
}

function renderAll() {
  renderAllOptions();
  MC_QUESTIONS.forEach(q =&gt; renderQuestion(q.id));
  updateScore();
  renderJumpGrid();
  renderSummary();
}

function showFeedback(qid, type, htmlText) {
  const fb = document.getElementById(`feedback-${qid}`);
  fb.className = `feedback show ${type}`;
  fb.innerHTML = htmlText;
}
function clearFeedback(qid) {
  const fb = document.getElementById(`feedback-${qid}`);
  fb.className = 'feedback';
  fb.innerHTML = '';
}

function checkCurrentQuestion(card) {
  if (!state.started) { beginActivity(); return; }
  const qid = card.dataset.qid;
  const q = questionById(qid);
  const qs = getQState(qid);
  if (qs.completed) {
    showFeedback(qid, qs.correct ? 'correct' : 'incorrect', `השאלה כבר הושלמה. נדרשו ${qs.attempts} ניסיונות.`);
    return;
  }
  const selectedInput = card.querySelector(`input[name="${qid}"]:checked`);
  if (!selectedInput) {
    showFeedback(qid, 'neutral', 'בחרו תשובה ואז לחצו על “בדוק שאלה זו”.');
    return;
  }
  qs.selected = Number(selectedInput.value);
  qs.attempts += 1;
  const isCorrect = qs.selected === q.correct;
  if (isCorrect) {
    qs.completed = true; qs.correct = true; qs.finalShown = true;
    showFeedback(qid, 'correct', `&lt;strong&gt;נכון מאוד.&lt;/strong&gt; נדרשו ${qs.attempts} ניסיונות.&lt;br&gt;${q.final}`);
  } else if (qs.attempts === 1) {
    showFeedback(qid, 'hint', `&lt;strong&gt;עדיין לא. רמז ראשון:&lt;/strong&gt;&lt;br&gt;${q.hint1}`);
  } else if (qs.attempts === 2) {
    showFeedback(qid, 'hint', `&lt;strong&gt;עדיין לא. רמז שני:&lt;/strong&gt;&lt;br&gt;${q.hint2}`);
  } else {
    qs.completed = true; qs.correct = false; qs.finalShown = true;
    showFeedback(qid, 'incorrect', `&lt;strong&gt;משוב סופי לאחר 3 ניסיונות.&lt;/strong&gt;&lt;br&gt;${q.final}`);
  }
  saveState();
  renderQuestion(qid);
  updateScore();
  renderJumpGrid();
  renderSummary();
  if (allQuestionsCompleted()) showEndPanel();
}

function resetQuestion(card) {
  const qid = card.dataset.qid;
  state.answers[qid] = defaultQuestionState();
  clearFeedback(qid);
  saveState();
  renderQuestion(qid);
  updateScore();
  renderJumpGrid();
  renderSummary();
}

function updateScore() {
  const vals = MC_QUESTIONS.map(q =&gt; getQState(q.id));
  const done = vals.filter(v =&gt; v.completed).length;
  const correct = vals.filter(v =&gt; v.correct).length;
  document.getElementById('scoreBox').textContent = `נענו ${done} מתוך ${totalQuestions} שאלות · נכונות: ${correct}`;
  updateCompletionMessage(done, correct);
}

function completionStatsHtml(vals) {
  const correct = vals.filter(v =&gt; v.correct).length;
  const firstTry = vals.filter(v =&gt; v.correct &amp;&amp; v.attempts === 1).length;
  const secondTry = vals.filter(v =&gt; v.correct &amp;&amp; v.attempts === 2).length;
  const thirdTryCorrect = vals.filter(v =&gt; v.correct &amp;&amp; v.attempts === 3).length;
  const finalFeedback = vals.filter(v =&gt; v.completed &amp;&amp; !v.correct).length;
  return `&lt;p&gt;&lt;strong&gt;סיכום פרק רבות־הברירה:&lt;/strong&gt; הושלמו ${totalQuestions} שאלות. תשובות נכונות: ${correct} מתוך ${totalQuestions}.&lt;/p&gt;
  &lt;p&gt;נכון בניסיון ראשון: ${firstTry} · נכון בניסיון שני: ${secondTry} · נכון בניסיון שלישי: ${thirdTryCorrect} · משוב סופי לאחר 3 ניסיונות: ${finalFeedback}&lt;/p&gt;`;
}

function updateCompletionMessage(done, correct) {
  const toast = document.getElementById('completionToast');
  if (!state.started) {
    if (toast) { toast.classList.remove('show'); toast.innerHTML = ''; }
    const panel0 = document.getElementById('endPanel');
    if (panel0) panel0.classList.remove('show');
    return;
  }
  const panel = document.getElementById('endPanel');
  const endSummary = document.getElementById('endSummary');
  if (done === totalQuestions) {
    const vals = MC_QUESTIONS.map(q =&gt; getQState(q.id));
    toast.classList.add('show');
    toast.innerHTML = `&lt;strong&gt;סיימתם את פרק רבות־הברירה.&lt;/strong&gt; כל השאלות בפרק זה נענו. אפשר להמשיך לפרק השאלות הפתוחות.`;
    if (endSummary) endSummary.innerHTML = completionStatsHtml(vals);
    panel.classList.add('show');
  } else {
    toast.classList.remove('show'); toast.innerHTML = '';
    if (endSummary) endSummary.innerHTML = '';
    panel.classList.remove('show');
  }
}

function allQuestionsCompleted() {
  return MC_QUESTIONS.every(q =&gt; getQState(q.id).completed);
}

function showEndPanel() {
  const panel = document.getElementById('endPanel');
  const heading = document.getElementById('endHeading');
  if (!panel || !panel.classList.contains('show')) return;
  requestAnimationFrame(() =&gt; {
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (heading) window.setTimeout(() =&gt; heading.focus({ preventScroll: true }), 260);
  });
}

function renderSummary() {
  let rows = '';
  MC_QUESTIONS.forEach((q, idx) =&gt; {
    const qs = getQState(q.id);
    const ans = selectedLetter(q.id, qs.selected);
    const status = qs.completed ? (qs.correct ? 'נכון' : 'לא נפתרה לאחר 3 ניסיונות') : 'עדיין לא הושלמה';
    rows += `&lt;tr&gt;&lt;td&gt;${idx+1}&lt;/td&gt;&lt;td&gt;${q.title}&lt;/td&gt;&lt;td&gt;${ans}&lt;/td&gt;&lt;td&gt;${qs.attempts}&lt;/td&gt;&lt;td&gt;${status}&lt;/td&gt;&lt;/tr&gt;`;
  });
  document.getElementById('summaryTable').innerHTML = `&lt;table class="summary-table"&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;שאלה&lt;/th&gt;&lt;th&gt;נושא&lt;/th&gt;&lt;th&gt;תשובה שסומנה&lt;/th&gt;&lt;th&gt;ניסיונות&lt;/th&gt;&lt;th&gt;סטטוס&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows}&lt;/tbody&gt;&lt;/table&gt;`;
}

function exportLog() {
  saveState();
  const lines = [];
  lines.push('תיעוד עבודת קיץ בכימיה — שאלות רבות־ברירה');
  lines.push('שם התלמיד/ה: ' + (state.studentName || ''));
  lines.push('בית הספר: ' + (state.schoolName || ''));
  lines.push('תאריך ייצוא: ' + new Date().toLocaleString('he-IL'));
  lines.push('');
  MC_QUESTIONS.forEach((q, idx) =&gt; {
    const qs = getQState(q.id);
    const ans = selectedLetter(q.id, qs.selected);
    const status = qs.completed ? (qs.correct ? 'נכון' : 'לא נפתרה לאחר 3 ניסיונות') : 'עדיין לא הושלמה';
    lines.push(`שאלה ${idx+1} — ${q.title} | תשובה שסומנה: ${ans} | ניסיונות: ${qs.attempts} | סטטוס: ${status}`);
  });
  const blob = new Blob([lines.join('\\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (state.studentName || 'student').replace(/[\/:*?"&lt;&gt;|]/g, '_');
  a.href = url;
  a.download = `chemistry_mc_log_${safeName}.txt`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function startNewRun(options = {}) {
  const { scrollToStart = true, activate = false, clearIdentity = false } = options;
  const studentName = clearIdentity ? '' : (document.getElementById('studentName').value || '').trim();
  const schoolName = clearIdentity ? '' : (document.getElementById('schoolName').value || '').trim();
  const previousOrders = state.orders || {};
  state = { studentName, schoolName, answers: {}, orders: previousOrders, started: !!activate };
  MC_QUESTIONS.forEach(q =&gt; state.answers[q.id] = defaultQuestionState());
  ensureOptionOrders(true);
  lastCommittedStudentName = studentName;
  document.getElementById('studentName').value = studentName;
  document.getElementById('schoolName').value = schoolName;
  saveState();
  document.querySelectorAll('.feedback').forEach(fb =&gt; { fb.className = 'feedback'; fb.innerHTML = ''; });
  document.querySelectorAll('.option').forEach(opt =&gt; opt.classList.remove('correct-option', 'wrong-option'));
  renderAll();
  updateActivityVisibility();
  if (state.started &amp;&amp; scrollToStart) showQuestion(0);
  if (!state.started &amp;&amp; scrollToStart) {
    window.setTimeout(() =&gt; {
      const input = document.getElementById('studentName');
      if (input) input.focus();
    }, 0);
  }
}

function resetAll() { startNewRun({ scrollToStart: true, activate: false }); }

function attachQuestionEvents() {
  getCards().forEach((card, idx) =&gt; {
    card.querySelectorAll('.check-btn').forEach(btn =&gt; btn.addEventListener('click', () =&gt; checkCurrentQuestion(card)));
    card.querySelectorAll('.reset-q-btn').forEach(btn =&gt; btn.addEventListener('click', () =&gt; resetQuestion(card)));
    card.querySelectorAll('.prev-btn').forEach(btn =&gt; btn.addEventListener('click', () =&gt; showQuestion(idx - 1)));
    card.querySelectorAll('.next-btn').forEach(btn =&gt; btn.addEventListener('click', () =&gt; showQuestion(idx + 1)));
  });
}

function beginActivity() {
  const input = document.getElementById('studentName');
  const name = (input.value || '').trim();
  if (!name) {
    setNameError(true);
    input.focus();
    return;
  }
  setNameError(false);
  state.studentName = name;
  state.schoolName = (document.getElementById('schoolName').value || '').trim();
  state.started = true;
  lastCommittedStudentName = name;
  saveState();
  updateActivityVisibility();
  renderAll();
  updateActivityVisibility();
  if (state.started) {
    showQuestion(0);
  } else {
    window.setTimeout(() =&gt; document.getElementById('studentName').focus(), 0);
  }
}

function handleStudentNameChange() {
  const input = document.getElementById('studentName');
  const newName = (input.value || '').trim();
  input.value = newName;
  updateStartButton();
  if (!newName) {
    state.started = false;
    setNameError(true);
    updateActivityVisibility();
    saveState();
    return;
  }
  setNameError(false);

  if (newName === lastCommittedStudentName) {
    state.studentName = newName;
    saveState();
    return;
  }

  // לפני תחילת הפרק, שינוי השם רק נשמר ואינו מקפיץ לשאלה הראשונה.
  if (!state.started &amp;&amp; !hasProgress()) {
    state.studentName = newName;
    lastCommittedStudentName = newName;
    saveState();
    return;
  }

  const message = 'שינוי שם התלמיד/ה יאפס את כל התוצאות, הניסיונות והמשובים, ויערבב את המסיחים מחדש. להמשיך?';
  if (!window.confirm(message)) {
    input.value = lastCommittedStudentName;
    state.studentName = lastCommittedStudentName;
    setNameError(!lastCommittedStudentName);
    updateStartButton();
    saveState();
    return;
  }

  // אחרי אישור שינוי שם באמצע פעילות חוזרים למסך הזדהות, עם השם החדש כבר מוזן.
  startNewRun({ scrollToStart: true, activate: false });
}

function init() {
  loadState();
  renderQuestionCards();
  renderAllOptions();
  attachQuestionEvents();
  const studentNameInput = document.getElementById('studentName');
  const schoolNameInput = document.getElementById('schoolName');
  studentNameInput.addEventListener('input', () =&gt; { setNameError(false); updateStartButton(); });
  studentNameInput.addEventListener('change', handleStudentNameChange);
  studentNameInput.addEventListener('blur', handleStudentNameChange);
  studentNameInput.addEventListener('keydown', (e) =&gt; { if (e.key === 'Enter') { e.preventDefault(); schoolNameInput.focus(); } });
  schoolNameInput.addEventListener('input', saveState);
  schoolNameInput.addEventListener('keydown', (e) =&gt; { if (e.key === 'Enter') { e.preventDefault(); beginActivity(); } });
  document.getElementById('startActivityBtn').addEventListener('click', beginActivity);
  document.getElementById('exportBtn').addEventListener('click', exportLog);
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  document.getElementById('backToStartBtn').addEventListener('click', () =&gt; showQuestion(0));
  renderAll();
  updateActivityVisibility();
  if (state.started) {
    showQuestion(0);
  } else {
    window.setTimeout(() =&gt; document.getElementById('studentName').focus(), 0);
  }
}

document.addEventListener('DOMContentLoaded', init);

    &lt;div class="toolbar"&gt;

&lt;main class="wrap"&gt;
  &lt;section class="card" id="intro" tabindex="-1"&gt;
    &lt;h2&gt;הנחיות עבודה&lt;/h2&gt;
    &lt;p&gt;בשאלות פתוחות כתבו תחילה תשובה משלכם. רק לאחר שנכתבה תשובה אפשר לפתוח “כיוון חשיבה” או להציג מענה להשוואה. לאחר הצגת המענה השוו אליו את תשובתכם וסמנו את הבדיקה העצמית.&lt;/p&gt;
    &lt;p&gt;בניסוח תגובות אפשר לכתוב חץ רגיל כך: &lt;span class="formula"&gt;-&amp;gt;&lt;/span&gt;. בתגובות המסה במים חובה לציין מים על החץ או בתוך החץ; אפשר לכתוב זאת כך: &lt;span class="formula"&gt;--H&lt;sub&gt;2&lt;/sub&gt;O(l)-&amp;gt;&lt;/span&gt;. אין צורך להשתמש בכתב תחתי בתיבת התשובה.&lt;/p&gt;
  &lt;/section&gt;

  &lt;div id="cards"&gt;&lt;/div&gt;

  &lt;section class="card" id="summary" tabindex="-1"&gt;

    &lt;/div&gt;

    answer:'NaI הוא חומר יוני הבנוי מיוני Na⁺ ו־I⁻ בסריג יוני. כוחות המשיכה החשמליים בין היונים חזקים מאוד, ולכן טמפרטורות ההתכה והרתיחה שלו גבוהות והוא מוצק בטמפרטורת החדר.&lt;br&gt;&lt;br&gt;לעומת זאת, CH₃OCH₂CH₃ הוא חומר מולקולרי. בין המולקולות פועלים קשרים בין־מולקולריים חלשים בהרבה מן הקשרים בסריג יוני, ולכן טמפרטורת הרתיחה שלו נמוכה והוא גז בטמפרטורת החדר.',
    checks:['ציינתי ש־NaI הוא חומר יוני.','ציינתי שיש בו סריג יוני / כוחות משיכה חשמליים בין יונים חיוביים ושליליים.','ציינתי ש־CH₃OCH₂CH₃ הוא חומר מולקולרי.','ציינתי שבחומר מולקולרי פועלים קשרים בין־מולקולריים חלשים יותר.','קישרתי בין סוג החומר וחוזק הכוחות לבין מצב הצבירה בטמפרטורת החדר.']
  }
];

const state = loadState();

function loadState(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); if(document.getElementById('summaryContent')) buildSummary(); }
function escapeHtml(s){ return String(s||'').replace(/[&amp;&lt;&gt;"]/g, ch =&gt; ({'&amp;':'&amp;amp;','&lt;':'&amp;lt;','&gt;':'&amp;gt;','"':'&amp;quot;'}[ch])); }
function normalizeText(s){ return String(s||'').trim().toLowerCase().replace(/[־–—-]/g,' ').replace(/\s+/g,' '); }
function getQState(id){ if(!state[id]) state[id]={attempts:0}; return state[id]; }
function scrollToCard(id){
  const el=document.getElementById('card-'+id);
  if(el){ el.scrollIntoView({block:'start',behavior:'smooth'}); setTimeout(()=&gt;el.focus({preventScroll:true}),300); }
}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML = questions.map(q=&gt;`&lt;a href="#card-${q.id}"&gt;${q.id}&lt;/a&gt;`).join('') + `&lt;a href="#summary"&gt;סיכום&lt;/a&gt;`;
}

function renderCards(){
  const root=document.getElementById('cards');
  root.innerHTML = questions.map(q =&gt; renderCard(q)).join('');
  attachHandlers();
  restoreInputs();
}

function renderCard(q){
  const body = q.type.startsWith('auto') ? renderAuto(q) : renderOpen(q);
  return `&lt;section class="card" id="card-${q.id}" tabindex="-1" data-qid="${q.id}"&gt;
    &lt;div class="card-title"&gt;&lt;h2&gt;${q.title}&lt;/h2&gt;&lt;span class="badge"&gt;${q.badge}&lt;/span&gt;&lt;/div&gt;
    &lt;div class="question-text"&gt;${q.prompt}&lt;/div&gt;
    ${body}
  &lt;/section&gt;`;
}

function renderAuto(q){
  if(q.type==='auto-choice'){
    return `&lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;
  }
  if(q.type==='auto-numbers'){
    return `&lt;div class="grid"&gt;${q.fields.map(([key,label])=&gt;`&lt;label class="auto-group"&gt;${label}&lt;br&gt;&lt;input type="number" inputmode="numeric" data-qid="${q.id}" data-field="${key}"&gt;&lt;/label&gt;`).join('')}&lt;/div&gt;
    &lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;
  }
  if(q.type==='auto-states'){
    return `&lt;div class="grid"&gt;${q.substances.map(([key,label])=&gt;`&lt;label class="auto-group"&gt;&lt;span class="formula"&gt;${label}&lt;/span&gt;&lt;br&gt;&lt;select data-qid="${q.id}" data-field="${key}"&gt;&lt;option value=""&gt;בחרו...&lt;/option&gt;&lt;option value="solid"&gt;מוצק&lt;/option&gt;&lt;option value="liquid"&gt;נוזל&lt;/option&gt;&lt;option value="gas"&gt;גז&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;`).join('')}&lt;/div&gt;
    &lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;
  }
  if(q.type==='auto-choice-list'){
    return `&lt;div class="grid"&gt;${q.options.map(([value,label])=&gt;`&lt;label class="auto-group"&gt;&lt;input type="radio" name="choice-${q.id}" data-qid="${q.id}" data-field="choice" value="${value}"&gt; ${label}&lt;/label&gt;`).join('')}&lt;/div&gt;
    &lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;
  }
  if(q.type==='auto-text'){
    return `&lt;div class="auto-group"&gt;&lt;label&gt;תשובה קצרה:&lt;br&gt;&lt;input type="text" data-qid="${q.id}" data-field="text" placeholder="כתבו תשובה"&gt;&lt;/label&gt;&lt;/div&gt;
    &lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;
  }
  return '';
}


function isReactionQuestion(q){ return q.inputDir === 'ltr'; }
function openAnswerButtonText(q){ return isReactionQuestion(q) ? 'הצג את הניסוח הנכון' : 'הצג דוגמה לתשובה מלאה'; }
function openAnswerLabel(q){ return isReactionQuestion(q) ? 'הניסוח הנכון:' : 'דוגמה לתשובה מלאה:'; }
function openComparisonText(q){ return isReactionQuestion(q) ? 'לניסוח הנכון' : 'לדוגמה לתשובה מלאה'; }
function renderOpen(q){
  const isChemReaction = q.inputDir === 'ltr';
  const taClass = isChemReaction ? ' class="chem-reaction-input" dir="ltr" spellcheck="false"' : '';
  const placeholder = q.placeholder || 'כתבו כאן את תשובתכם או תיאור קצר של מה שכתבתם/ציירתם על הדף';
  return `&lt;textarea data-qid="${q.id}"${taClass} placeholder="${placeholder}"&gt;&lt;/textarea&gt;
    &lt;div class="locked-note" id="lock-${q.id}"&gt;כתבו תשובה בתיבה לפני פתיחת כיוון חשיבה או הצגת מענה להשוואה.&lt;/div&gt;
    &lt;div class="actions"&gt;
      &lt;button class="secondary show-direction" data-qid="${q.id}" type="button" disabled&gt;צריכים כיוון?&lt;/button&gt;
      &lt;button class="primary show-answer" data-qid="${q.id}" type="button" disabled&gt;${openAnswerButtonText(q)}&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class="feedback err hidden" id="open-msg-${q.id}"&gt;&lt;/div&gt;
    &lt;div class="direction hidden" id="dir-${q.id}"&gt;&lt;b&gt;כיוון חשיבה:&lt;/b&gt;&lt;br&gt;${q.direction}&lt;/div&gt;
    &lt;div class="answer hidden" id="ans-${q.id}"&gt;&lt;b&gt;${openAnswerLabel(q)}&lt;/b&gt;&lt;br&gt;${q.answer}&lt;/div&gt;
    &lt;div class="selfcheck hidden" id="check-${q.id}"&gt;
      &lt;h3&gt;בדיקה עצמית לאחר השוואה ${openComparisonText(q)}&lt;/h3&gt;
      &lt;div class="checklist"&gt;${q.checks.map((c,i)=&gt;`&lt;label&gt;&lt;input type="checkbox" data-qid="${q.id}" data-check="${i}"&gt; ${c}&lt;/label&gt;`).join('')}&lt;/div&gt;
      &lt;div class="assessment"&gt;&lt;b&gt;הערכה עצמית:&lt;/b&gt;
        &lt;div class="radio-row"&gt;
          &lt;label&gt;&lt;input type="radio" name="assess-${q.id}" data-qid="${q.id}" value="full"&gt; התשובה שלי מלאה&lt;/label&gt;
          &lt;label&gt;&lt;input type="radio" name="assess-${q.id}" data-qid="${q.id}" value="partial"&gt; התשובה שלי חלקית&lt;/label&gt;
          &lt;label&gt;&lt;input type="radio" name="assess-${q.id}" data-qid="${q.id}" value="wrong"&gt; התשובה שלי לא נכונה / לא ידעתי&lt;/label&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;`;
}

function hasOpenText(qid){
  const ta=document.querySelector(`textarea[data-qid="${qid}"]`);
  return !!(ta &amp;&amp; ta.value.trim().length&gt;0);
}
function updateOpenButtons(qid){
  const has=hasOpenText(qid);
  document.querySelectorAll(`button[data-qid="${qid}"].show-direction, button[data-qid="${qid}"].show-answer`).forEach(btn=&gt;{
    btn.disabled=!has;
    btn.title=has?'':'כתבו תשובה לפני פתיחת כיוון או הצגת מענה להשוואה';
  });
  const lock=document.getElementById('lock-'+qid);
  if(lock) lock.classList.toggle('hidden', has);
  const msg=document.getElementById('open-msg-'+qid);
  if(has &amp;&amp; msg) msg.classList.add('hidden');
}
function requireOpenText(qid){
  if(hasOpenText(qid)) return true;
  const msg=document.getElementById('open-msg-'+qid);
  if(msg){
    msg.textContent='כתבו תשובה משלכם לפני פתיחת כיוון חשיבה או הצגת מענה להשוואה.';
    msg.classList.remove('hidden');
  }
  const ta=document.querySelector(`textarea[data-qid="${qid}"]`);
  if(ta) ta.focus();
  return false;
}

function attachHandlers(){
  document.querySelectorAll('.show-direction').forEach(btn=&gt;btn.addEventListener('click',()=&gt;{
    const qid=btn.dataset.qid; if(!requireOpenText(qid)) return;
    document.getElementById('dir-'+qid).classList.remove('hidden');
    getQState(qid).directionShown=true; saveState();
  }));
  document.querySelectorAll('.show-answer').forEach(btn=&gt;btn.addEventListener('click',()=&gt;{
    const qid=btn.dataset.qid; if(!requireOpenText(qid)) return;
    document.getElementById('ans-'+qid).classList.remove('hidden'); document.getElementById('check-'+qid).classList.remove('hidden');
    getQState(qid).answerShown=true; saveState();
    setTimeout(()=&gt;document.getElementById('ans-'+qid).scrollIntoView({block:'nearest',behavior:'smooth'}),50);
  }));
  document.querySelectorAll('textarea').forEach(t=&gt;t.addEventListener('input',()=&gt;{ const s=getQState(t.dataset.qid); s.text=t.value; updateOpenButtons(t.dataset.qid); saveState(); }));
  document.querySelectorAll('[data-check]').forEach(ch=&gt;ch.addEventListener('change',()=&gt;{
    const s=getQState(ch.dataset.qid); if(!s.checks) s.checks={}; s.checks[ch.dataset.check]=ch.checked; saveState();
  }));
  document.querySelectorAll('input[type="radio"][data-qid][name^="assess-"]').forEach(r=&gt;r.addEventListener('change',()=&gt;{ getQState(r.dataset.qid).assessment=r.value; saveState(); }));
  document.querySelectorAll('.check-auto').forEach(btn=&gt;btn.addEventListener('click',()=&gt;checkAuto(btn.dataset.qid)));
  document.querySelectorAll('input[data-field], select[data-field]').forEach(inp=&gt;inp.addEventListener('change',()=&gt;{
    const s=getQState(inp.dataset.qid); if(!s.values) s.values={}; s.values[inp.dataset.field]=inp.value; saveState();
  }));
  document.querySelectorAll('input[name="modelChoice"]').forEach(r=&gt;r.addEventListener('change',()=&gt;{
    const s=getQState('1.1a'); s.values={modelChoice:r.value}; saveState();
  }));
}
function restoreInputs(){
  questions.forEach(q=&gt;{
    const s=getQState(q.id);
    if(q.type==='open'){
      const ta=document.querySelector(`textarea[data-qid="${q.id}"]`); if(ta &amp;&amp; s.text) ta.value=s.text;
      if(s.directionShown) document.getElementById('dir-'+q.id)?.classList.remove('hidden');
      if(s.answerShown){ document.getElementById('ans-'+q.id)?.classList.remove('hidden'); document.getElementById('check-'+q.id)?.classList.remove('hidden'); }
      if(s.checks){ Object.entries(s.checks).forEach(([i,val])=&gt;{ const ch=document.querySelector(`input[data-qid="${q.id}"][data-check="${i}"]`); if(ch) ch.checked=!!val; }); }
      if(s.assessment){ const r=document.querySelector(`input[name="assess-${q.id}"][value="${s.assessment}"]`); if(r) r.checked=true; }
      updateOpenButtons(q.id);
    } else {
      if(s.values){
        Object.entries(s.values).forEach(([k,v])=&gt;{
          const inp=document.querySelector(`[data-qid="${q.id}"][data-field="${k}"]`); if(inp){ if(inp.type==='radio'){ const rr=document.querySelector(`input[name="choice-${q.id}"][value="${v}"]`); if(rr) rr.checked=true; } else inp.value=v; }
          if(k==='modelChoice'){ const r=document.querySelector(`input[name="modelChoice"][value="${v}"]`); if(r) r.checked=true; }
        });
      }
      if(s.lastFeedback) showFeedback(q.id, s.lastFeedback.kind, s.lastFeedback.html);
    }
  });
}

function checkAuto(qid){
  const q=questions.find(x=&gt;x.id===qid); const s=getQState(qid); let ok=false;
  if(q.type==='auto-choice'){
    const val=document.querySelector('input[name="modelChoice"]:checked')?.value || '';
    s.values={modelChoice:val}; ok=val===q.correct;
  }
  if(q.type==='auto-numbers'){
    s.values=s.values||{}; ok=true;
    q.fields.forEach(([key,label,correct])=&gt;{
      const val=document.querySelector(`input[data-qid="${qid}"][data-field="${key}"]`).value;
      s.values[key]=val; if(Number(val)!==correct) ok=false;
    });
  }
  if(q.type==='auto-states'){
    s.values=s.values||{}; ok=true;
    q.substances.forEach(([key,label,correct])=&gt;{
      const val=document.querySelector(`select[data-qid="${qid}"][data-field="${key}"]`).value;
      s.values[key]=val; if(val!==correct) ok=false;
    });
  }
  if(q.type==='auto-choice-list'){
    const val=document.querySelector(`input[name="choice-${qid}"]:checked`)?.value || '';
    s.values={choice:val}; ok=val===q.correct;
  }
  if(q.type==='auto-text'){
    const val=document.querySelector(`input[data-qid="${qid}"][data-field="text"]`).value;
    s.values={text:val}; const norm=normalizeText(val); ok=q.correct.some(c=&gt;normalizeText(c)===norm);
  }
  s.attempts=(s.attempts||0)+1;
  let fb;
  if(ok){ fb={kind:'ok', html:`נכון. ${q.final}`}; s.autoStatus='correct'; if(!s.correctAttempt) s.correctAttempt=s.attempts; }
  else if(s.attempts===1){ fb={kind:'hint', html:`עדיין לא. רמז ראשון: ${q.hints[0]}`}; s.autoStatus='hint'; }
  else if(s.attempts===2){ fb={kind:'hint', html:`עדיין לא. רמז שני: ${q.hints[1]}`}; s.autoStatus='hint'; }
  else { fb={kind:'err', html:`לא מדויק. התשובה הנכונה היא: ${q.final}`}; s.autoStatus='solution'; }
  s.lastFeedback=fb; saveState(); showFeedback(qid, fb.kind, fb.html);
}

function showFeedback(qid, kind, html){
  const el=document.getElementById('fb-'+qid); if(!el) return;
  el.className='feedback '+(kind==='ok'?'ok':kind==='err'?'err':'hint'); el.innerHTML=html; el.classList.remove('hidden');
}

function openCheckCount(q,s){ return s.checks ? Object.values(s.checks).filter(Boolean).length : 0; }
function totalOpenChecks(q){ return Array.isArray(q.checks) ? q.checks.length : 0; }
function openStatus(q,s){
  if(!(s.text||'').trim()) return 'לא נכתבה תשובה';
  if(!s.answerShown) return 'נכתבה תשובה, טרם הוצג מענה להשוואה';
  if(!s.assessment) return 'הוצג מענה להשוואה, טרם סומנה הערכה';
  return 'הושלם';
}
function autoStatusHeb(s){
  if(!s || !s.lastFeedback) return 'לא נבדק';
  if(s.lastFeedback.kind==='ok') return `נכון${s.correctAttempt?` בניסיון ${s.correctAttempt}`:''}`;
  if(s.lastFeedback.kind==='err') return 'הגיע/ה לפתרון לאחר 3 ניסיונות';
  return 'קיבל/ה רמז';
}
function qShortTitle(q){ return q.title.replace(/^\S+\s—\s/,''); }
function flagsForQuestion(q,s){
  const flags=[];
  if(q.type==='open'){
    const text=(s.text||'').trim();
    const checked=openCheckCount(q,s);
    const total=totalOpenChecks(q);
    if(!text) flags.push('לא נכתבה תשובה');
    if(text &amp;&amp; !s.answerShown) flags.push('לא הוצג מענה להשוואה');
    if(s.answerShown &amp;&amp; total &amp;&amp; checked &lt; Math.ceil(total/2)) flags.push('פחות מחצי מסעיפי הבדיקה סומנו');
    if(s.assessment==='partial') flags.push('סומן חלקי');
    if(s.assessment==='wrong') flags.push('סומן לא נכון / לא ידעתי');
  } else {
    if(!s.lastFeedback) flags.push('לא נבדק');
    if(s.lastFeedback &amp;&amp; s.lastFeedback.kind==='err') flags.push('הגיע/ה לפתרון');
    if((s.attempts||0)&gt;=3) flags.push('3 ניסיונות');
  }
  return flags;
}
function buildSummary(){
  const autoQs=questions.filter(q=&gt;q.type!=='open');
  const openQs=questions.filter(q=&gt;q.type==='open');
  const autoDone=autoQs.filter(q=&gt;getQState(q.id).lastFeedback).length;
  const autoCorrect=autoQs.filter(q=&gt;getQState(q.id).lastFeedback?.kind==='ok').length;
  const autoFirst=autoQs.filter(q=&gt;getQState(q.id).lastFeedback?.kind==='ok' &amp;&amp; (getQState(q.id).correctAttempt||getQState(q.id).attempts)===1).length;
  const openAnswered=openQs.filter(q=&gt;(getQState(q.id).text||'').trim()).length;
  const full=openQs.filter(q=&gt;getQState(q.id).assessment==='full').length;
  const partial=openQs.filter(q=&gt;getQState(q.id).assessment==='partial').length;
  const wrong=openQs.filter(q=&gt;getQState(q.id).assessment==='wrong').length;
  const flags=[];
  questions.forEach(q=&gt;{
    const fs=flagsForQuestion(q,getQState(q.id));
    if(fs.length) flags.push({id:q.id,title:qShortTitle(q),flags:fs});
  });

  const studentHtml = `
    &lt;div class="summary-kpis"&gt;
      &lt;div class="kpi"&gt;&lt;b&gt;${autoDone}/${autoQs.length}&lt;/b&gt;שאלות אוטומטיות נבדקו&lt;/div&gt;
      &lt;div class="kpi"&gt;&lt;b&gt;${autoCorrect}&lt;/b&gt;שאלות אוטומטיות נכונות&lt;/div&gt;
      &lt;div class="kpi"&gt;&lt;b&gt;${autoFirst}&lt;/b&gt;נכונות בניסיון ראשון&lt;/div&gt;
      &lt;div class="kpi"&gt;&lt;b&gt;${openAnswered}/${openQs.length}&lt;/b&gt;שאלות פתוחות עם תשובה&lt;/div&gt;
    &lt;/div&gt;
    &lt;p&gt;&lt;b&gt;הערכה עצמית בפתוחות:&lt;/b&gt; מלאה: ${full} · חלקית: ${partial} · לא נכונה/לא ידעתי: ${wrong} · טרם סומנה: ${openQs.length-full-partial-wrong}&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;כדאי לחזור על:&lt;/b&gt;&lt;/p&gt;
    ${flags.length ? `&lt;ul class="flag-list"&gt;${flags.slice(0,8).map(f=&gt;`&lt;li&gt;&lt;b&gt;${f.id}&lt;/b&gt; — ${f.title}: ${f.flags.join(' · ')}&lt;/li&gt;`).join('')}&lt;/ul&gt;` : '&lt;p&gt;&lt;span class="ok-chip"&gt;אין סעיפים שסומנו לחזרה כרגע.&lt;/span&gt;&lt;/p&gt;'}
  `;
  document.getElementById('studentSummary').innerHTML=studentHtml;

  const rows=questions.map(q=&gt;{
    const s=getQState(q.id);
    if(q.type==='open'){
      const checked=openCheckCount(q,s), total=totalOpenChecks(q);
      const flags=flagsForQuestion(q,s);
      return `&lt;tr&gt;&lt;td&gt;&lt;b&gt;${q.id}&lt;/b&gt;&lt;br&gt;${qShortTitle(q)}&lt;/td&gt;&lt;td&gt;פתוחה&lt;/td&gt;&lt;td&gt;${openStatus(q,s)}&lt;/td&gt;&lt;td&gt;${s.directionShown?'כן':'לא'}&lt;/td&gt;&lt;td&gt;${checked}/${total}&lt;/td&gt;&lt;td&gt;${assessmentHeb(s.assessment)}&lt;/td&gt;&lt;td&gt;${flags.length?flags.map(x=&gt;`&lt;span class="flag"&gt;${x}&lt;/span&gt;`).join(' '):'&lt;span class="ok-chip"&gt;תקין&lt;/span&gt;'}&lt;/td&gt;&lt;/tr&gt;`;
    }
    const flags=flagsForQuestion(q,s);
    return `&lt;tr&gt;&lt;td&gt;&lt;b&gt;${q.id}&lt;/b&gt;&lt;br&gt;${qShortTitle(q)}&lt;/td&gt;&lt;td&gt;אוטומטית&lt;/td&gt;&lt;td&gt;${autoStatusHeb(s)}&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;${flags.length?flags.map(x=&gt;`&lt;span class="flag"&gt;${x}&lt;/span&gt;`).join(' '):'&lt;span class="ok-chip"&gt;תקין&lt;/span&gt;'}&lt;/td&gt;&lt;/tr&gt;`;
  }).join('');
  document.getElementById('teacherSummaryTable').innerHTML=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;סעיף&lt;/th&gt;&lt;th&gt;סוג&lt;/th&gt;&lt;th&gt;סטטוס&lt;/th&gt;&lt;th&gt;כיוון נפתח?&lt;/th&gt;&lt;th&gt;בדיקה עצמית&lt;/th&gt;&lt;th&gt;הערכה עצמית&lt;/th&gt;&lt;th&gt;דגלים&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows}&lt;/tbody&gt;`;

  const details=[];
  questions.forEach(q=&gt;{
    const s=getQState(q.id);
    if(q.type==='open'){
      const checked=(s.checks?Object.entries(s.checks).filter(([i,v])=&gt;v).map(([i])=&gt;`${Number(i)+1}. ${q.checks[Number(i)]}`):[]);
      details.push(`&lt;div class="summary-item"&gt;&lt;b&gt;${q.id} ${qShortTitle(q)}&lt;/b&gt;&lt;br&gt;תשובה: ${escapeHtml((s.text||'').slice(0,1000)) || '&lt;span class="small"&gt;לא נכתבה&lt;/span&gt;'}&lt;br&gt;פתח/ה כיוון: ${s.directionShown?'כן':'לא'} · הציג/ה מענה להשוואה: ${s.answerShown?'כן':'לא'}&lt;br&gt;בדיקה עצמית שסומנה:&lt;br&gt;${checked.length?checked.map(x=&gt;`• ${escapeHtml(x)}`).join('&lt;br&gt;'):'&lt;span class="small"&gt;לא סומן&lt;/span&gt;'}&lt;br&gt;הערכה עצמית: ${assessmentHeb(s.assessment)}&lt;/div&gt;`);
    } else {
      details.push(`&lt;div class="summary-item"&gt;&lt;b&gt;${q.id} ${qShortTitle(q)}&lt;/b&gt;&lt;br&gt;סטטוס: ${autoStatusHeb(s)} · ניסיונות: ${s.attempts||0}&lt;/div&gt;`);
    }
  });
  document.getElementById('summaryContent').innerHTML=details.join('');
}
function assessmentHeb(v){ return v==='full'?'מלאה':v==='partial'?'חלקית':v==='wrong'?'לא נכונה / לא ידעתי':'לא סומנה'; }
function buildPlainSummary(){
  const lines=[];
  lines.push('דוח למורה — שאלה פתוחה 1');
  lines.push('');
  questions.forEach(q=&gt;{
    const s=getQState(q.id);
    lines.push(`${q.id} ${qShortTitle(q)}`);
    if(q.type==='open'){
      const checked=(s.checks?Object.entries(s.checks).filter(([i,v])=&gt;v).map(([i])=&gt;`${Number(i)+1}. ${q.checks[Number(i)]}`):[]);
      lines.push(`סוג: פתוחה`);
      lines.push(`סטטוס: ${openStatus(q,s)}`);
      lines.push(`כיוון נפתח: ${s.directionShown?'כן':'לא'}`);
      lines.push(`הערכת תלמיד/ה: ${assessmentHeb(s.assessment)}`);
      lines.push(`בדיקה עצמית שסומנה: ${checked.join(' | ')||'לא סומן'}`);
      lines.push(`תשובת התלמיד/ה: ${s.text||''}`);
    } else {
      lines.push(`סוג: אוטומטית`);
      lines.push(`סטטוס: ${autoStatusHeb(s)}`);
      lines.push(`ניסיונות: ${s.attempts||0}`);
    }
    lines.push('---');
  });
  return lines.join('\n');
}

document.getElementById('resetBtn').addEventListener('click',()=&gt;{
  if(confirm('לאפס את כל התשובות והסימונים בדף הזה?')){ localStorage.removeItem(STORAGE_KEY); location.reload(); }
});
document.getElementById('buildSummary').addEventListener('click',buildSummary);
document.getElementById('toggleFullSummary').addEventListener('click',()=&gt;{
  const box=document.getElementById('fullSummaryBox');
  const btn=document.getElementById('toggleFullSummary');
  const hidden=box.classList.toggle('hidden');
  btn.textContent=hidden?'הצג תשובות מלאות':'הסתר תשובות מלאות';
  if(!hidden) buildSummary();
});
document.getElementById('copySummary').addEventListener('click',async()=&gt;{
  const text=buildPlainSummary();
  try{ await navigator.clipboard.writeText(text); alert('הסיכום למורה הועתק ללוח.'); }
  catch(e){ alert('לא הצלחתי להעתיק אוטומטית. אפשר לסמן ולהעתיק מתוך הסיכום.'); }
});

renderNav();
renderCards();
buildSummary();

&lt;script&gt;
const STORAGE_KEY = 'chem_open_q2_final_v2';

const state = loadState();
function loadState(){ 
  try{
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"q":{},"current":"intro"}');
    if(!parsed.q) parsed.q = {};
    if(!parsed.current) parsed.current = "intro";
    return parsed;
  }catch(e){return {q:{}, current:"intro"};} 
}
let saveTimer = null;
function markUnsaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='שומר...'; el.classList.remove('saved'); }
}
function markSaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='נשמר אוטומטית'; el.classList.add('saved'); }
}
function saveState(){ 
  try{
    markUnsaved();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); 
    clearTimeout(saveTimer);
    saveTimer=setTimeout(markSaved,180);
  } catch(e){
    const el=document.getElementById('saveStatus');
    if(el){ el.textContent='לא נשמר — ייתכן שהדפדפן חוסם שמירה מקומית'; el.classList.remove('saved'); }
  }
}
window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', ()=&gt;{ if(document.visibilityState==='hidden') saveState(); });
function getQState(id){ if(!state.q[id]) state.q[id]={}; return state.q[id]; }
function normalizeText(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function escapeHtml(s){ return String(s||'').replace(/[&amp;&lt;&gt;]/g,c=&gt;({'&amp;':'&amp;amp;','&lt;':'&amp;lt;','&gt;':'&amp;gt;'}[c])); }
function currentIndex(){
  return questions.findIndex(q=&gt;q.id===state.current);
}
function setCurrent(id){
  state.current = id;
  saveState();
  showCurrent();
}
function isQuestionAnswered(q){
  const s=getQState(q.id);
  if(q.type==='open') return !!((s.text||'').trim());
  if(q.type==='auto-choice-list') return !!(s.values &amp;&amp; s.values.choice);
  if(q.type==='auto-number') return !!(s.values &amp;&amp; String(s.values.number||'').trim());
  return false;
}
function isForwardTarget(target){
  const cur = currentIndex();
  const targetIndex = target === 'summary' ? questions.length : questions.findIndex(q=&gt;q.id===target);
  return cur &gt;= 0 &amp;&amp; targetIndex &gt; cur;
}
function showNavWarning(message){
  const box=document.getElementById('navWarning');
  if(!box) return;
  box.textContent=message;
  box.classList.remove('hidden');
  clearTimeout(window.__navWarningTimer);
  window.__navWarningTimer=setTimeout(()=&gt;box.classList.add('hidden'),4200);
}
function navigateTo(target){
  const curQ = questions.find(q=&gt;q.id===state.current);
  if(curQ &amp;&amp; isForwardTarget(target) &amp;&amp; !isQuestionAnswered(curQ)){
    showNavWarning('שימו לב: דילגתם על סעיף שלא נענה. אפשר לחזור אליו בהמשך, והוא יסומן בסיכום.');
  }
  setCurrent(target);
}
function scrollToCard(id){ navigateTo(id); }
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML = questions.map(q=&gt;`&lt;a href="#card-${q.id}" data-nav-id="${q.id}" onclick="event.preventDefault();navigateTo('${q.id}')"&gt;${q.id}&lt;/a&gt;`).join('') + `&lt;a href="#summaryCard" data-nav-id="summary" onclick="event.preventDefault();navigateTo('summary')"&gt;סיכום&lt;/a&gt;`;
}
function showCurrent(){
  const current = state.current || "intro";
  document.getElementById('intro')?.classList.toggle('paged-hidden', current !== "intro");
  document.getElementById('summaryCard')?.classList.toggle('paged-hidden', current !== "summary");
  questions.forEach(q=&gt;{
    const el=document.getElementById('card-'+q.id);
    if(el) el.classList.toggle('paged-hidden', current !== q.id);
  });
  document.querySelectorAll('#nav a').forEach(a=&gt;a.classList.toggle('active', a.dataset.navId===current));
  const activeNav=document.querySelector('#nav a.active');
  if(activeNav){ activeNav.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'}); }
  if(current==="summary") buildSummary();
  const target = current==="intro" ? document.getElementById('intro') : current==="summary" ? document.getElementById('summaryCard') : document.getElementById('card-'+current);
  if(target){
    setTimeout(()=&gt;{target.scrollIntoView({behavior:'smooth', block:'start'}); target.focus?.({preventScroll:true});}, 30);
  }
}
function renderCards(){
  const root=document.getElementById('cards'); root.innerHTML='';
  questions.forEach((q,i)=&gt;{
    const card=document.createElement('section'); card.className='card'; card.id='card-'+q.id; card.tabIndex=-1;
    const body = q.type.startsWith('auto') ? renderAuto(q) : renderOpen(q);
    card.innerHTML=`&lt;div class="card-title"&gt;&lt;h2&gt;${q.id} — ${q.title}&lt;/h2&gt;&lt;span class="badge"&gt;סעיף ${i+1} מתוך ${questions.length}&lt;/span&gt;&lt;/div&gt;&lt;div class="question-text"&gt;${q.prompt}&lt;/div&gt;${body}${renderPageControls(i)}`;
    root.appendChild(card);
  });
  attachHandlers(); restoreInputs();
}
function renderPageControls(i){
  const prevId = i===0 ? "intro" : questions[i-1].id;
  const nextId = i===questions.length-1 ? "summary" : questions[i+1].id;
  const nextText = i===questions.length-1 ? "לסיכום שאלה 2" : "לסעיף הבא";
  return `&lt;div class="page-controls"&gt;
    &lt;div class="right"&gt;
      &lt;button type="button" class="secondary page-prev" data-target="${prevId}"&gt;הקודם&lt;/button&gt;
      &lt;button type="button" class="primary page-next" data-target="${nextId}"&gt;${nextText}&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class="left"&gt;&lt;span class="save-status saved"&gt;נשמר אוטומטית&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;`;
}

function checkAuto(qid){

  &lt;meta name="viewport" content="width=device-width, initial-scale=1" /&gt;
  &lt;title&gt;שאלה פתוחה 3 — חמצון־חיזור&lt;/title&gt;
  &lt;style&gt;
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#172033;
      --muted:#647089;
      --line:#d9deea;
      --soft:#eef2ff;
      --accent:#2f5fd0;
      --accent2:#1746ad;
      --good:#117a46;
      --bad:#a93c3c;
      --warn:#8a5a00;
      --radius:18px;
      --shadow:0 10px 30px rgba(20,30,60,.09);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Arial,"Noto Sans Hebrew",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
    header{position:sticky;top:0;z-index:20;background:rgba(246,247,251,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
    .wrap{max-width:1050px;margin:0 auto;padding:18px 18px 40px}
    h1{font-size:1.7rem;margin:.2rem 0 .3rem}
    h2{font-size:1.35rem;margin:0 0 .65rem}
    h3{font-size:1.08rem;margin:.7rem 0 .35rem}
    p{margin:.4rem 0}
    .subtitle{color:var(--muted);margin-top:0}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px}
    .pill{background:var(--soft);border:1px solid #dce4ff;color:#274179;padding:7px 12px;border-radius:999px;font-size:.92rem;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin:22px 0;scroll-margin-top:90px;}
    .card:focus{outline:3px solid rgba(47,95,208,.22)}
    .card-title{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
    .badge{display:inline-block;background:#f0f4ff;color:#204389;border:1px solid #d9e4ff;border-radius:999px;padding:3px 10px;font-size:.85rem;white-space:nowrap;}
    .question-text{font-weight:650;margin-top:10px}
    .formula{direction:ltr;unicode-bidi:isolate-override;display:inline-block;font-family:"Times New Roman",Cambria,serif;font-size:1.08em;white-space:nowrap;}
    .formula-block,.eqbox{direction:ltr;unicode-bidi:isolate-override;display:block;text-align:center;font-family:"Times New Roman",Cambria,serif;font-size:1.18rem;margin:12px auto;padding:8px;}
    .eqbox{background:#fbfcff;border:1px solid var(--line);border-radius:14px;overflow:auto;}
    sup,sub{line-height:0}
    textarea{width:100%;min-height:105px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fbfcff;color:var(--ink);margin-top:12px;}
    textarea.chem-reaction-input{direction:ltr;unicode-bidi:plaintext;text-align:left;font-family:"Times New Roman",Cambria,serif;font-size:1.08rem;}
    textarea.calc-input{direction:ltr;unicode-bidi:plaintext;text-align:left;font-family:"Times New Roman",Cambria,serif;font-size:1.08rem;}
    .example-box{margin-top:10px;padding:10px 12px;border:1px solid #d6def2;background:#f8faff;border-radius:12px;color:#30415f;}
    input[type="text"],input[type="number"],select{border:1px solid var(--line);border-radius:12px;padding:9px 10px;font:inherit;background:#fbfcff;color:var(--ink);min-width:95px;}
    input.ltr-input{direction:ltr;text-align:left;unicode-bidi:plaintext;font-family:"Times New Roman",Cambria,serif;}
    button{border:1px solid #b9c6e6;background:white;color:#20304f;border-radius:12px;padding:9px 14px;font:inherit;cursor:pointer;transition:.12s ease;}
    button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,50,90,.12)}
    button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700}
    button.primary:hover{background:var(--accent2)}
    button.secondary{background:#f7f9ff}
    button.danger{border-color:#f0c6c6;color:#8b2222;background:#fff8f8}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;align-items:center}
    .direction,.answer,.selfcheck,.feedback,.summary-box{border-radius:15px;padding:14px 16px;margin-top:14px;border:1px solid var(--line);}
    .direction{background:#fffaf0;border-color:#f1d39a;color:#533800}
    .answer{background:#f5fff8;border-color:#bfe4cd}
    .selfcheck{background:#f8fbff;border-color:#cad8f1}
    .feedback.ok{background:#f2fff7;border-color:#a9d9ba;color:#07572e}
    .feedback.err{background:#fff6f5;border-color:#edbeb8;color:#8b2c20}
    .feedback.hint{background:#fffaf0;border-color:#efd28f;color:#5a3d00}
    .feedback.warn{background:#fffaf0;border-color:#efd28f;color:#5a3d00}
    .hidden{display:none !important}
    .checklist label,.radio-row label{display:block;padding:7px 0;}
    .checklist input,.radio-row input{transform:scale(1.15);margin-left:8px}
    .assessment{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px}
    .auto-group{background:#fbfcff;border:1px solid var(--line);border-radius:14px;padding:12px}
    .navlist{display:flex;gap:8px;overflow:auto;padding:8px 0 2px}
    .navlist a{white-space:nowrap;text-decoration:none;color:#24478f;border:1px solid #cedaf5;background:white;border-radius:999px;padding:5px 10px;font-size:.88rem}
    .summary-box{background:#f7f8fc}
    .summary-list{font-size:.93rem;max-height:360px;overflow:auto;background:white;border:1px solid var(--line);border-radius:13px;padding:10px}
    .summary-item{border-bottom:1px solid #edf0f6;padding:8px 0}.summary-item:last-child{border-bottom:none}
    .chem-ltr{direction:ltr;unicode-bidi:isolate;display:inline-block;white-space:nowrap;}
    .small{font-size:.9rem;color:var(--muted)}
    .summary-table{width:100%;border-collapse:collapse;background:white;border-radius:13px;overflow:hidden}
    .summary-table th,.summary-table td{border:1px solid var(--line);padding:8px;text-align:right;vertical-align:top;font-size:.92rem}
    .summary-table th{background:#eef2ff;color:#233b72;font-weight:700}
    .table-scroll{overflow:auto;max-height:440px;border:1px solid var(--line);border-radius:13px;background:white}
    .summary-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:10px 0}
    .kpi{background:white;border:1px solid var(--line);border-radius:13px;padding:10px}
    .kpi b{display:block;font-size:1.25rem;color:#24478f}
    .flag-list{margin:.35rem 0 0;padding-right:1.2rem}
    .flag{display:inline-block;background:#fff4e5;border:1px solid #f0c57c;color:#6f4300;border-radius:999px;padding:2px 8px;margin:2px;font-size:.82rem}
    .ok-chip{display:inline-block;background:#f0fff6;border:1px solid #b9dfc8;color:#0b5a31;border-radius:999px;padding:2px 8px;margin:2px;font-size:.82rem}
    .locked-note{font-size:.9rem;color:#7a4a00;margin-top:8px}

    .auto-row{direction:rtl;text-align:right;justify-content:flex-start}
    .auto-row input{direction:ltr;text-align:left;unicode-bidi:plaintext}

    .paged-hidden{display:none !important}
    .page-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
    .page-controls .right,.page-controls .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .save-status{font-size:.9rem;color:var(--muted)}
    .save-status.saved{color:var(--good)}
    .start-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .navlist a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .nav-warning{margin:8px 0 0;padding:9px 12px;border-radius:12px;background:#fff7df;border:1px solid #f0ce7b;color:#6f4200;font-weight:700}
    .number-answer{max-width:360px;direction:rtl;text-align:right}
    .number-answer label{display:block;text-align:right}
    .number-answer .number-line{display:flex;direction:rtl;justify-content:flex-start;align-items:center;gap:8px}
    .number-answer input{direction:ltr;text-align:left;unicode-bidi:plaintext;max-width:180px}
    .structured-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    .structured-field textarea{width:100%;min-height:82px;margin-top:8px}
    .structured-field .radio-row label{padding:4px 0}
    .part-result{margin:.35rem 0;padding:.45rem .6rem;border-radius:10px;border:1px solid var(--line);background:white}
    .part-result.ok{border-color:#a9d9ba;background:#f5fff8;color:#07572e}
    .part-result.warn{border-color:#efd28f;background:#fffaf0;color:#5a3d00}
    .part-result.err{border-color:#edbeb8;background:#fff6f5;color:#8b2c20}
    @media (max-width:700px){.wrap{padding:14px}.card{padding:16px}.card-title{display:block}.badge{margin-top:6px}}
  &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;header&gt;
  &lt;div class="wrap" style="padding-bottom:14px"&gt;
    &lt;h1&gt;שאלה פתוחה 3 — חמצון־חיזור&lt;/h1&gt;
    &lt;div class="toolbar"&gt;
      &lt;span class="pill"&gt;פתוחות: תשובה → מענה להשוואה → בדיקה עצמית&lt;/span&gt;
      &lt;span class="pill"&gt;קצרות: בדיקה אוטומטית עם רמזים&lt;/span&gt;
      &lt;button class="danger" id="resetBtn" type="button"&gt;איפוס הדף&lt;/button&gt;&lt;span class="save-status saved" id="saveStatus"&gt;נשמר אוטומטית&lt;/span&gt;
    &lt;/div&gt;
    &lt;nav class="navlist" aria-label="מעבר בין סעיפים" id="nav"&gt;&lt;/nav&gt;
  &lt;div class="nav-warning hidden" id="navWarning"&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/header&gt;

&lt;main class="wrap"&gt;
  &lt;section class="card" id="intro"&gt;
    &lt;h2&gt;הקדמה&lt;/h2&gt;
    &lt;p&gt;שאלה 3 עוסקת בכושר היחסי של מתכות לחזר ובכושר היחסי של יונים מומסים לחמצן.&lt;/p&gt;
    &lt;p&gt;לפניכם רשימה של יוני מתכת מומסים:&lt;/p&gt;
    &lt;div class="eqbox"&gt;Cu&lt;sup&gt;2+&lt;/sup&gt;&lt;sub&gt;(aq)&lt;/sub&gt;, Ag&lt;sup&gt;+&lt;/sup&gt;&lt;sub&gt;(aq)&lt;/sub&gt;, Fe&lt;sup&gt;2+&lt;/sup&gt;&lt;sub&gt;(aq)&lt;/sub&gt;, Zn&lt;sup&gt;2+&lt;/sup&gt;&lt;sub&gt;(aq)&lt;/sub&gt;&lt;/div&gt;
    &lt;div class="example-box small"&gt;
      בתגובות בשאלה זו יש לכתוב &lt;b&gt;תגובות נטו בלבד&lt;/b&gt;. אין צורך לכלול יונים משקיפים. בתיבת התשובה אפשר לכתוב חץ רגיל כך &lt;span class="formula"&gt;-&amp;gt;&lt;/span&gt;, ואין צורך בכתב תחתי או עילי.
    &lt;/div&gt;
    &lt;div class="start-actions"&gt;
      &lt;button class="primary" id="beginBtn" type="button"&gt;התחלת שאלה 3&lt;/button&gt;
      &lt;span class="small"&gt;התשובות נשמרות אוטומטית בדפדפן הזה. אפשר לסגור ולחזור לאותו קישור כדי להמשיך.&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;
  &lt;div id="cards"&gt;&lt;/div&gt;
  &lt;section class="card" id="summaryCard"&gt;
    &lt;div class="card-title"&gt;&lt;h2&gt;סיכום שאלה 3&lt;/h2&gt;&lt;span class="badge"&gt;סיכום&lt;/span&gt;&lt;/div&gt;
    &lt;div class="actions"&gt;
      &lt;button class="primary" id="buildSummary" type="button"&gt;עדכן סיכום&lt;/button&gt;
      &lt;button class="secondary" id="toggleFullSummary" type="button"&gt;הצג תשובות מלאות&lt;/button&gt;
      &lt;button class="secondary" id="copySummary" type="button"&gt;העתק דוח למורה&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class="summary-box" id="studentSummary"&gt;&lt;/div&gt;
    &lt;h3&gt;דוח מקוצר למורה&lt;/h3&gt;
    &lt;div class="table-scroll"&gt;&lt;table class="summary-table" id="teacherSummaryTable"&gt;&lt;/table&gt;&lt;/div&gt;
    &lt;div class="summary-box hidden" id="fullSummaryBox"&gt;
      &lt;h3&gt;תשובות מלאות&lt;/h3&gt;
      &lt;div class="summary-list" id="summaryContent"&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;
&lt;/main&gt;

&lt;script&gt;
const STORAGE_KEY = 'chem_open_q3_final_v2';
const questions = [

   "כתבתי את &lt;span class=\"formula\"&gt;Zn&lt;sup&gt;2+&lt;/sup&gt;&lt;sub&gt;(aq)&lt;/sub&gt;&lt;/span&gt; כתוצר.",

function openCheckCount(q,s){ return s.checks ? Object.values(s.checks).filter(Boolean).length : 0; }

function flagsForQuestion(q,s){ const flags=[]; if(q.type==='open'){ const text=(s.text||'').trim(); const checked=openCheckCount(q,s), total=totalOpenChecks(q); if(!text) flags.push('לא נכתבה תשובה'); if(text&amp;&amp;!s.answerShown) flags.push('לא הוצג מענה להשוואה'); if(s.answerShown&amp;&amp;total&amp;&amp;checked&lt;Math.ceil(total/2)) flags.push('פחות מחצי מסעיפי הבדיקה סומנו'); if(s.assessment==='partial') flags.push('סומן חלקי'); if(s.assessment==='wrong') flags.push('סומן לא נכון / לא ידעתי'); } else { if(!s.lastFeedback) flags.push('לא נבדק'); if(s.lastFeedback&amp;&amp;s.lastFeedback.kind==='warn') flags.push('התקבל עם הערה'); if(s.lastFeedback&amp;&amp;s.lastFeedback.kind==='err') flags.push('דורש תיקון'); if((s.attempts||0)&gt;=3) flags.push('3 ניסיונות'); } return flags; }
function buildSummary(){

    header{position:sticky;top:0;z-index:20;background:rgba(246,247,251,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
    .wrap{max-width:1050px;margin:0 auto;padding:18px 18px 40px}
    h1{font-size:1.7rem;margin:.2rem 0 .3rem}
    h2{font-size:1.35rem;margin:0 0 .65rem}
    h3{font-size:1.08rem;margin:.7rem 0 .35rem}
    p{margin:.4rem 0}
    .subtitle{color:var(--muted);margin-top:0}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px}
    .pill{background:var(--soft);border:1px solid #dce4ff;color:#274179;padding:7px 12px;border-radius:999px;font-size:.92rem;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin:22px 0;scroll-margin-top:90px;}
    .card:focus{outline:3px solid rgba(47,95,208,.22)}
    .card-title{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
    .badge{display:inline-block;background:#f0f4ff;color:#204389;border:1px solid #d9e4ff;border-radius:999px;padding:3px 10px;font-size:.85rem;white-space:nowrap;}
    .question-text{font-weight:650;margin-top:10px}
    .formula{direction:ltr;unicode-bidi:isolate;display:inline-block;font-family:"Times New Roman",Cambria,serif;font-size:1.08em;white-space:nowrap;}
    .formula-block,.eqbox{direction:ltr;unicode-bidi:isolate;display:block;text-align:center;font-family:"Times New Roman",Cambria,serif;font-size:1.18rem;margin:12px auto;padding:8px;}
    .eqbox{background:#fbfcff;border:1px solid var(--line);border-radius:14px;overflow:auto;}
    sup,sub{line-height:0}
    textarea{width:100%;min-height:105px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fbfcff;color:var(--ink);margin-top:12px;}
    textarea.chem-reaction-input{direction:ltr;unicode-bidi:plaintext;text-align:left;font-family:"Times New Roman",Cambria,serif;font-size:1.08rem;}
    textarea.calc-input{direction:ltr;unicode-bidi:plaintext;text-align:left;font-family:"Times New Roman",Cambria,serif;font-size:1.08rem;}
    .example-box{margin-top:10px;padding:10px 12px;border:1px solid #d6def2;background:#f8faff;border-radius:12px;color:#30415f;}
    input[type="text"],input[type="number"],select{border:1px solid var(--line);border-radius:12px;padding:9px 10px;font:inherit;background:#fbfcff;color:var(--ink);min-width:95px;}
    input.ltr-input{direction:ltr;text-align:left;unicode-bidi:plaintext;font-family:"Times New Roman",Cambria,serif;}
    button{border:1px solid #b9c6e6;background:white;color:#20304f;border-radius:12px;padding:9px 14px;font:inherit;cursor:pointer;transition:.12s ease;}
    button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,50,90,.12)}
    button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700}
    button.primary:hover{background:var(--accent2)}
    button.secondary{background:#f7f9ff}
    button.danger{border-color:#f0c6c6;color:#8b2222;background:#fff8f8}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;align-items:center}
    .direction,.answer,.selfcheck,.feedback,.summary-box{border-radius:15px;padding:14px 16px;margin-top:14px;border:1px solid var(--line);}
    .direction{background:#fffaf0;border-color:#f1d39a;color:#533800}
    .answer{background:#f5fff8;border-color:#bfe4cd}
    .selfcheck{background:#f8fbff;border-color:#cad8f1}
    .feedback.ok{background:#f2fff7;border-color:#a9d9ba;color:#07572e}
    .feedback.err{background:#fff6f5;border-color:#edbeb8;color:#8b2c20}
    .feedback.hint{background:#fffaf0;border-color:#efd28f;color:#5a3d00}
    .feedback.warn{background:#fffaf0;border-color:#efd28f;color:#5a3d00}
    .hidden{display:none !important}
    .checklist label,.radio-row label{display:block;padding:7px 0;}
    .checklist input,.radio-row input{transform:scale(1.15);margin-left:8px}
    .assessment{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px}
    .auto-group{background:#fbfcff;border:1px solid var(--line);border-radius:14px;padding:12px}
    .navlist{display:flex;gap:8px;overflow:auto;padding:8px 0 2px}
    .navlist a{white-space:nowrap;text-decoration:none;color:#24478f;border:1px solid #cedaf5;background:white;border-radius:999px;padding:5px 10px;font-size:.88rem}
    .summary-box{background:#f7f8fc}
    .summary-list{font-size:.93rem;max-height:360px;overflow:auto;background:white;border:1px solid var(--line);border-radius:13px;padding:10px}
    .summary-item{border-bottom:1px solid #edf0f6;padding:8px 0}.summary-item:last-child{border-bottom:none}
    .chem-ltr{direction:ltr;unicode-bidi:isolate;display:inline-block;white-space:nowrap;}
    .small{font-size:.9rem;color:var(--muted)}
    .summary-table{width:100%;border-collapse:collapse;background:white;border-radius:13px;overflow:hidden}
    .summary-table th,.summary-table td{border:1px solid var(--line);padding:8px;text-align:right;vertical-align:top;font-size:.92rem}
    .summary-table th{background:#eef2ff;color:#233b72;font-weight:700}
    .table-scroll{overflow:auto;max-height:440px;border:1px solid var(--line);border-radius:13px;background:white}
    .summary-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:10px 0}
    .kpi{background:white;border:1px solid var(--line);border-radius:13px;padding:10px}
    .kpi b{display:block;font-size:1.25rem;color:#24478f}
    .flag-list{margin:.35rem 0 0;padding-right:1.2rem}
    .flag{display:inline-block;background:#fff4e5;border:1px solid #f0c57c;color:#6f4300;border-radius:999px;padding:2px 8px;margin:2px;font-size:.82rem}
    .ok-chip{display:inline-block;background:#f0fff6;border:1px solid #b9dfc8;color:#0b5a31;border-radius:999px;padding:2px 8px;margin:2px;font-size:.82rem}
    .locked-note{font-size:.9rem;color:#7a4a00;margin-top:8px}

    .auto-row{direction:rtl;text-align:right;justify-content:flex-start}
    .auto-row input{direction:ltr;text-align:left;unicode-bidi:plaintext}

    .paged-hidden{display:none !important}
    .page-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
    .page-controls .right,.page-controls .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .save-status{font-size:.9rem;color:var(--muted)}
    .save-status.saved{color:var(--good)}
    .start-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .navlist a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .nav-warning{margin:8px 0 0;padding:9px 12px;border-radius:12px;background:#fff7df;border:1px solid #f0ce7b;color:#6f4200;font-weight:700}
    .number-answer{max-width:360px;direction:rtl;text-align:right}
    .number-answer label{display:block;text-align:right}
    .number-answer .number-line{display:flex;direction:rtl;justify-content:flex-start;align-items:center;gap:8px}
    .number-answer input{direction:ltr;text-align:left;unicode-bidi:plaintext;max-width:180px}
    .unit-label{direction:rtl;unicode-bidi:isolate;text-align:right;white-space:nowrap}
    .structured-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    .structured-field textarea{width:100%;min-height:82px;margin-top:8px}
    .structured-field .radio-row label{padding:4px 0}
    .part-result{margin:.35rem 0;padding:.45rem .6rem;border-radius:10px;border:1px solid var(--line);background:white}
    .part-result.ok{border-color:#a9d9ba;background:#f5fff8;color:#07572e}
    .part-result.warn{border-color:#efd28f;background:#fffaf0;color:#5a3d00}
    .part-result.err{border-color:#edbeb8;background:#fff6f5;color:#8b2c20}

    .calc-solution{direction:rtl;text-align:right;background:#fbfcff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:10px}
    .calc-line{direction:ltr;unicode-bidi:isolate;text-align:left;font-family:"Times New Roman",Cambria,serif;font-size:1.08rem;margin:4px 0;white-space:nowrap;overflow-x:auto}
    .answer-table{width:100%;border-collapse:collapse;margin-top:8px;background:white}
    .answer-table th,.answer-table td{border:1px solid var(--line);padding:7px 9px;text-align:center}
    .answer-table th{background:#eef2ff}
    @media (max-width:700px){.wrap{padding:14px}.card{padding:16px}.card-title{display:block}.badge{margin-top:6px}}

&lt;header&gt;

    &lt;h2&gt;הקדמה&lt;/h2&gt;
    &lt;p&gt;נתונה תגובה בין אמוניה - &lt;span class="formula"&gt;NH&lt;sub&gt;3&lt;/sub&gt;&lt;/span&gt; וחמצן לקבלת חנקן חמצני ומים, לפי התגובה המאוזנת הבאה:&lt;/p&gt;

  &lt;/section&gt;
  &lt;div id="cards"&gt;&lt;/div&gt;

function parseNumber(raw){

  if(sci) return parseFloat(sci[1])*Math.pow(10,parseInt(sci[2],10));

function plain(s){ return String(s||'').toLowerCase().replace(/,/g,'.').replace(/\s+/g,''); }

  const pAg=firstPosAny(t,['ag','כסף']);

function calcHasMgMoles(raw){
  const t=plain(raw);

  const hasDivide = t.includes('/') || t.includes('÷') || t.includes('m/m') || t.includes('n=');

}
function calcHasFeConc(raw){
