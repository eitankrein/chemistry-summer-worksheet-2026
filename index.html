const state = loadState();
function loadState(){ 
  try{
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"q":{},"current":"intro"}');
    if(!parsed.q) parsed.q = {};
    if(!parsed.current) parsed.current = "intro";
    return parsed;
  }catch(e){return {q:{}, current:"intro"};} 
}
let saveTimer = null;
function markUnsaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='שומר...'; el.classList.remove('saved'); }
}
function markSaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='נשמר אוטומטית'; el.classList.add('saved'); }
}
function saveState(){ 
  try{
    markUnsaved();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); 
    clearTimeout(saveTimer);
    saveTimer=setTimeout(markSaved,180);
  } catch(e){
    const el=document.getElementById('saveStatus');
    if(el){ el.textContent='לא נשמר — ייתכן שהדפדפן חוסם שמירה מקומית'; el.classList.remove('saved'); }
  }
}
window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', ()=&gt;{ if(document.visibilityState==='hidden') saveState(); });
function getQState(id){ if(!state.q[id]) state.q[id]={}; return state.q[id]; }
function normalizeText(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function escapeHtml(s){ return String(s||'').replace(/[&amp;&lt;&gt;]/g,c=&gt;({'&amp;':'&amp;amp;','&lt;':'&amp;lt;','&gt;':'&amp;gt;'}[c])); }
function currentIndex(){
  return questions.findIndex(q=&gt;q.id===state.current);
}
function setCurrent(id){
  state.current = id;
  saveState();
  showCurrent();
}
function isQuestionAnswered(q){
  const s=getQState(q.id);
  if(q.type==='open') return !!((s.text||'').trim());
  if(q.type==='auto-choice-list') return !!(s.values &amp;&amp; s.values.choice);
  if(q.type==='auto-number') return !!(s.values &amp;&amp; String(s.values.number||'').trim());
  if(q.type==='auto-structured') return !!(s.values &amp;&amp; q.fields &amp;&amp; q.fields.every(f=&gt;String(s.values[f.key]||'').trim()));
  return false;
}
function isForwardTarget(target){
  const cur = currentIndex();
  const targetIndex = target === 'summary' ? questions.length : questions.findIndex(q=&gt;q.id===target);
  return cur &gt;= 0 &amp;&amp; targetIndex &gt; cur;
}
function showNavWarning(message){
  const box=document.getElementById('navWarning');
  if(!box) return;
  box.textContent=message;
  box.classList.remove('hidden');
  clearTimeout(window.__navWarningTimer);
  window.__navWarningTimer=setTimeout(()=&gt;box.classList.add('hidden'),4200);
}
function navigateTo(target){
  const curQ = questions.find(q=&gt;q.id===state.current);
  if(curQ &amp;&amp; isForwardTarget(target) &amp;&amp; !isQuestionAnswered(curQ)){
    showNavWarning('שימו לב: דילגתם על סעיף שלא נענה. אפשר לחזור אליו בהמשך, והוא יסומן בסיכום.');
  }
  setCurrent(target);
}
function scrollToCard(id){ navigateTo(id); }
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML = questions.map(q=&gt;`&lt;a href="#card-${q.id}" data-nav-id="${q.id}" onclick="event.preventDefault();navigateTo('${q.id}')"&gt;${q.id}&lt;/a&gt;`).join('') + `&lt;a href="#summaryCard" data-nav-id="summary" onclick="event.preventDefault();navigateTo('summary')"&gt;סיכום&lt;/a&gt;`;
}
function showCurrent(){
  const current = state.current || "intro";
  document.getElementById('intro')?.classList.toggle('paged-hidden', current !== "intro");
  document.getElementById('summaryCard')?.classList.toggle('paged-hidden', current !== "summary");
  questions.forEach(q=&gt;{
    const el=document.getElementById('card-'+q.id);
    if(el) el.classList.toggle('paged-hidden', current !== q.id);
  });
  document.querySelectorAll('#nav a').forEach(a=&gt;a.classList.toggle('active', a.dataset.navId===current));
  const activeNav=document.querySelector('#nav a.active');
  if(activeNav){ activeNav.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'}); }
  if(current==="summary") buildSummary();
  const target = current==="intro" ? document.getElementById('intro') : current==="summary" ? document.getElementById('summaryCard') : document.getElementById('card-'+current);
  if(target){
    setTimeout(()=&gt;{target.scrollIntoView({behavior:'smooth', block:'start'}); target.focus?.({preventScroll:true});}, 30);
  }
}
function renderCards(){
  const root=document.getElementById('cards'); root.innerHTML='';
  questions.forEach((q,i)=&gt;{
    const card=document.createElement('section'); card.className='card'; card.id='card-'+q.id; card.tabIndex=-1;

    card.innerHTML=`&lt;div class="card-title"&gt;&lt;h2&gt;${q.title}&lt;/h2&gt;&lt;span class="badge"&gt;${q.type==='open'?'פתוחה':'בדיקה אוטומטית'}&lt;/span&gt;&lt;/div&gt;&lt;div class="question-text"&gt;${q.prompt}&lt;/div&gt;${body}${renderPageControls(i)}`;

function renderPageControls(i){
  const prevId = i===0 ? "intro" : questions[i-1].id;

  &lt;/div&gt;`;
}
function renderAuto(q){

}
function hasOpenText(qid){ const ta=document.querySelector(`textarea[data-qid="${qid}"]`); return !!(ta &amp;&amp; ta.value.trim().length&gt;0); }
function updateOpenButtons(qid){
  const has=hasOpenText(qid);
  document.querySelectorAll(`button[data-qid="${qid}"].show-direction, button[data-qid="${qid}"].show-answer`).forEach(btn=&gt;{btn.disabled=!has; btn.title=has?'':'כתבו תשובה לפני פתיחת כיוון או הצגת מענה להשוואה';});
  const lock=document.getElementById('lock-'+qid); if(lock) lock.classList.toggle('hidden', has);
  const msg=document.getElementById('open-msg-'+qid); if(has &amp;&amp; msg) msg.classList.add('hidden');
}
function requireOpenText(qid){
  if(hasOpenText(qid)) return true;
  const msg=document.getElementById('open-msg-'+qid); if(msg){msg.textContent='כתבו תשובה משלכם לפני פתיחת כיוון חשיבה או הצגת מענה להשוואה.'; msg.classList.remove('hidden');}
  const ta=document.querySelector(`textarea[data-qid="${qid}"]`); if(ta) ta.focus(); return false;
}
function attachHandlers(){
  document.querySelectorAll('.show-direction').forEach(btn=&gt;btn.addEventListener('click',()=&gt;{ const qid=btn.dataset.qid; if(!requireOpenText(qid)) return; document.getElementById('dir-'+qid).classList.remove('hidden'); getQState(qid).directionShown=true; saveState(); }));
  document.querySelectorAll('.show-answer').forEach(btn=&gt;btn.addEventListener('click',()=&gt;{ const qid=btn.dataset.qid; if(!requireOpenText(qid)) return; document.getElementById('ans-'+qid).classList.remove('hidden'); document.getElementById('check-'+qid).classList.remove('hidden'); getQState(qid).answerShown=true; saveState(); setTimeout(()=&gt;document.getElementById('ans-'+qid).scrollIntoView({block:'nearest',behavior:'smooth'}),50); }));
  document.querySelectorAll('textarea[data-qid]:not([data-field])').forEach(t=&gt;t.addEventListener('input',()=&gt;{ const s=getQState(t.dataset.qid); s.text=t.value; updateOpenButtons(t.dataset.qid); saveState(); }));
  document.querySelectorAll('[data-check]').forEach(ch=&gt;ch.addEventListener('change',()=&gt;{ const s=getQState(ch.dataset.qid); if(!s.checks) s.checks={}; s.checks[ch.dataset.check]=ch.checked; saveState(); }));
  document.querySelectorAll('input[type="radio"][data-qid][name^="assess-"]').forEach(r=&gt;r.addEventListener('change',()=&gt;{ getQState(r.dataset.qid).assessment=r.value; saveState(); }));
  document.querySelectorAll('.check-auto').forEach(btn=&gt;btn.addEventListener('click',()=&gt;checkAuto(btn.dataset.qid)));
  document.querySelectorAll('input[data-field],select[data-field],textarea[data-field]').forEach(inp=&gt;{
    const handler=()=&gt;{ const s=getQState(inp.dataset.qid); if(!s.values) s.values={}; s.values[inp.dataset.field]=inp.value; saveState(); };
    inp.addEventListener('change',handler);
    inp.addEventListener('input',handler);
  });
  document.querySelectorAll('.page-prev,.page-next').forEach(btn=&gt;btn.addEventListener('click',()=&gt;navigateTo(btn.dataset.target)));
}
function restoreInputs(){
  questions.forEach(q=&gt;{ const s=getQState(q.id); if(q.type==='open'){
    const ta=document.querySelector(`textarea[data-qid="${q.id}"]`); if(ta &amp;&amp; s.text) ta.value=s.text;
    if(s.directionShown) document.getElementById('dir-'+q.id)?.classList.remove('hidden');
    if(s.answerShown){ document.getElementById('ans-'+q.id)?.classList.remove('hidden'); document.getElementById('check-'+q.id)?.classList.remove('hidden'); }
    if(s.checks){ Object.entries(s.checks).forEach(([i,val])=&gt;{ const ch=document.querySelector(`input[data-qid="${q.id}"][data-check="${i}"]`); if(ch) ch.checked=!!val; }); }
    if(s.assessment){ const r=document.querySelector(`input[name="assess-${q.id}"][value="${s.assessment}"]`); if(r) r.checked=true; }
    updateOpenButtons(q.id);
  } else { if(s.values){ Object.entries(s.values).forEach(([k,v])=&gt;{ const inp=document.querySelector(`[data-qid="${q.id}"][data-field="${k}"]`); if(inp){ if(inp.type==='radio'){ const rr=document.querySelector(`input[name="choice-${q.id}"][value="${v}"]`) || document.querySelector(`input[name="field-${q.id}-${k}"][value="${v}"]`); if(rr) rr.checked=true; } else inp.value=v; } }); } if(s.lastFeedback) showFeedback(q.id,s.lastFeedback.kind,s.lastFeedback.html); } });
}
function checkAuto(qid){
  const q=questions.find(x=&gt;x.id===qid); const s=getQState(qid); let ok=false;
  if(q.type==='auto-choice-list'){
    const picked=document.querySelector(`input[name="choice-${qid}"]:checked`);
    if(!picked){
      showFeedback(qid,'err','לא בחרתם תשובה. בחרו אפשרות ואז לחצו “בדוק תשובה”.');
      return;
    }
    const val=picked.value; s.values={choice:val}; ok=val===q.correct;
  }
  if(q.type==='auto-number'){
    const raw=document.querySelector(`input[data-qid="${qid}"][data-field="number"]`).value.trim();
    if(!raw){
      showFeedback(qid,'err','לא כתבתם תשובה. כתבו מספר ואז לחצו “בדוק תשובה”.');
      return;
    }
    const num=parseNumber(raw); s.values={number:raw};
    if(q.checker){
      s.attempts=(s.attempts||0)+1;
      const result=checkNumberWithWarnings(q,num,raw,s.attempts);
      if((result.kind==='ok' || result.kind==='warn') &amp;&amp; !s.correctAttempt) s.correctAttempt=s.attempts;
      s.lastFeedback=result; s.autoStatus=result.kind;
      saveState(); showFeedback(qid,result.kind,result.html);
      return;
    }
    ok=!isNaN(num) &amp;&amp; num&gt;=q.acceptMin &amp;&amp; num&lt;=q.acceptMax;
  }
  if(q.type==='auto-structured'){
    const values={};
    q.fields.forEach(f=&gt;{
      if(f.kind==='radio'){
        const picked=document.querySelector(`input[name="field-${qid}-${f.key}"]:checked`);
        values[f.key]=picked?picked.value:'';
      } else {
        const inp=document.querySelector(`[data-qid="${qid}"][data-field="${f.key}"]`);
        values[f.key]=inp?inp.value.trim():'';
      }
    });
    s.values=values;
    const missing=q.fields.filter(f=&gt;!String(values[f.key]||'').trim()).map(f=&gt;f.label.replace(/&lt;[^&gt;]*&gt;/g,''));
    if(missing.length){
      showFeedback(qid,'err',`חסרים שדות לבדיקה:&lt;ul&gt;${missing.map(x=&gt;`&lt;li&gt;${escapeHtml(x)}&lt;/li&gt;`).join('')}&lt;/ul&gt;`);
      saveState();
      return;
    }
    s.attempts=(s.attempts||0)+1;
    const result=checkStructured(q,values);
    s.lastFeedback={kind:result.kind, html:result.html};
    if(result.kind==='ok' &amp;&amp; !s.correctAttempt) s.correctAttempt=s.attempts;
    s.autoStatus=result.kind;
    saveState(); showFeedback(qid,result.kind,result.html);
    return;
  }
  s.attempts=(s.attempts||0)+1;
  let fb;
  if(ok){ fb={kind:'ok', html:`נכון. ${q.final}`}; s.autoStatus='correct'; if(!s.correctAttempt) s.correctAttempt=s.attempts; }
  else if(s.attempts===1){ fb={kind:'hint', html:`עדיין לא. רמז ראשון: ${q.hints[0]}`}; s.autoStatus='hint'; }
  else if(s.attempts===2){ fb={kind:'hint', html:`עדיין לא. רמז שני: ${q.hints[1]}`}; s.autoStatus='hint'; }
  else { fb={kind:'err', html:`לא מדויק. התשובה הנכונה היא: ${q.final}`}; s.autoStatus='solution'; }
  s.lastFeedback=fb; saveState(); showFeedback(qid,fb.kind,fb.html);
}
function parseNumber(raw){
  let s=String(raw||'').trim().replace(/[−–—]/g,'-').replace(/,/g,'.').replace(/×/g,'*').replace(/·/g,'*');
  let sci=s.match(/(-?\d+(?:\.\d+)?)\s*(?:e|E)\s*(-?\d+)/);
  if(sci) return parseFloat(sci[1])*Math.pow(10,parseInt(sci[2],10));
  sci=s.match(/(-?\d+(?:\.\d+)?)\s*\*?\s*10\s*(?:\^|\*\*)\s*(-?\d+)/i);
  if(sci) return parseFloat(sci[1])*Math.pow(10,parseInt(sci[2],10));
  const m=s.match(/-?\d+(?:\.\d+)?/);
  return m?parseFloat(m[0]):NaN;
}
function near(x,target,tol){ return Math.abs(x-target)&lt;=tol; }
function plain(s){ return String(s||'').toLowerCase().replace(/,/g,'.').replace(/\s+/g,''); }
function firstPosAny(text, aliases){
  let best=Infinity; aliases.forEach(a=&gt;{ const p=text.indexOf(a); if(p&gt;=0 &amp;&amp; p&lt;best) best=p; }); return best;
}
function orderLooksCorrect(raw){
  const t=plain(raw);
  const pZn=firstPosAny(t,['zn','אבץ']);
  const pCu=firstPosAny(t,['cu','נחושת']);
  const pAg=firstPosAny(t,['ag','כסף']);
  return Number.isFinite(pZn) &amp;&amp; Number.isFinite(pCu) &amp;&amp; Number.isFinite(pAg) &amp;&amp; pZn&lt;pCu &amp;&amp; pCu&lt;pAg;
}
function calcHasMgMoles(raw){
  const t=plain(raw);
  const hasMass = t.includes('0.7') || (t.includes('1.0') &amp;&amp; t.includes('0.3')) || (t.includes('1-0.3'));
  const hasMolar = t.includes('24.3') || t.includes('24');
  const hasDivide = t.includes('/') || t.includes('÷') || t.includes('m/m') || t.includes('n=');
  return hasMass &amp;&amp; hasMolar &amp;&amp; hasDivide;
}
function calcHasFeConc(raw){
  const t=plain(raw);
  const hasRatio = t.includes('2') &amp;&amp; (t.includes('0.0288') || t.includes('0.029') || t.includes('0.03') || t.includes('n(mg)'));
  const hasMoles = t.includes('0.0576') || (t.includes('2') &amp;&amp; (t.includes('0.0288') || t.includes('0.029')));
  const hasVol = t.includes('0.250') || t.includes('0.25') || t.includes('250ml') || t.includes('250מ');
  const hasC = t.includes('c=') || t.includes('n/v') || t.includes('0.0576/0.25') || t.includes('0.0576/0.250');
  return hasRatio &amp;&amp; hasMoles &amp;&amp; hasVol &amp;&amp; hasC;
}
function part(label,status,msg){
  const cls=status==='ok'?'ok':status==='warn'?'warn':'err';
  const icon=status==='ok'?'✓':status==='warn'?'⚠':'✗';
  return `&lt;div class="part-result ${cls}"&gt;&lt;b&gt;${icon} ${label}&lt;/b&gt;&lt;br&gt;${msg}&lt;/div&gt;`;
}

function numberRetryFeedback(q,attempts){
  if(attempts===1) return {kind:'hint', html:`עדיין לא. רמז ראשון: ${q.hints[0]}`};
  if(attempts===2) return {kind:'hint', html:`עדיין לא. רמז שני: ${q.hints[1]}`};
  if(q.suppressFinalFeedback) return {kind:'err', html:'לא מדויק. בדקו שוב את החישוב, או עברו לסעיף החישוב הבא להשוואה.'};
  return {kind:'err', html:`לא מדויק. התשובה הנכונה היא: ${q.final}`};
}
function checkNumberWithWarnings(q,num,raw,attempts){
  if(isNaN(num)) return {kind:'err', html:'לא הצלחתי לזהות מספר בתשובה. כתבו מספר עשרוני בלבד.'};
  if(q.checker==='mgMolesNumber'){
    if(near(num,0.0288,0.00015) || near(num,0.029,0.00055)){
      return {kind:'ok', html:`נכון. ${q.final}`};
    }
    if(near(num,0.03,0.002)){
      return {kind:'warn', html:'התשובה מתקבלת, אבל זה עיגול גס. עדיף להשאיר 0.0288mol, או לכל היותר 0.029mol.'};
    }
    if(near(num,0.3,0.02)){
      return {kind:'warn', html:'התשובה מתקבלת עם הערה, אבל נראה שנשמט אפס אחרי הנקודה. החישוב נותן 0.0288mol, ולא 0.3mol.'};
    }
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='feConcentrationNumber'){
    if(near(num,0.2304,0.0005) || near(num,0.23,0.005)){
      return {kind:'ok', html:`נכון. ${q.final}`};
    }
    if(near(num,0.2,0.015)){
      return {kind:'warn', html:'התשובה מתקבלת, אבל זה עיגול יתר. עדיף לכתוב 0.2304M או 0.23M.'};
    }
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='balancedElectronsNumber'){
    if(near(num,20,0.05)) return {kind:'ok', html:`נכון. ${q.final}`};
    if(near(num,5,0.05)) return {kind:'err', html:'זיהיתם נכון שכל אטום N מאבד 5 אלקטרונים, אבל בתגובה המאוזנת יש 4 אטומי N. צריך להכפיל ב־4.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='oxygenMassNumber'){
    if(near(num,24,0.05)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.75,0.02)) return {kind:'err', html:'חישבתם כנראה את מספר המולים של O₂. הסעיף מבקש מסה בגרמים, לכן צריך לחשב גם מסה.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='noMassNumber'){
    if(near(num,18,0.05)) return {kind:'ok', html:`נכון. ${q.final}`};
    if(near(num,0.6,0.02)) return {kind:'err', html:'חישבתם כנראה את מספר המולים של NO. הסעיף מבקש מסה בגרמים, לכן צריך להכפיל ב־30 g/mol.'};
    if(near(num,16.2,0.1)) return {kind:'err', html:'זו מסת המים המתקבלים. בסעיף הזה התוצר המבוקש הוא NO.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='givenElectronsNumber'){
    if(near(num,3,0.01)) return {kind:'ok', html:`נכון. ${q.final}`};
    if(near(num,20,0.05)) return {kind:'err', html:'20 mol e⁻ מתאים לתגובה המאוזנת כפי שהיא כתובה. כאן צריך להתאים את מספר מולי האלקטרונים ל־10.2 גרם אמוניה.'};
    return numberRetryFeedback(q,attempts);
  }

  if(q.checker==='q5SaltConcNumber'){
    if(near(num,0.0100,0.0002) || near(num,0.01,0.0002)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.1,0.002)) return {kind:'err', html:'זה מספר המולים של המלח, לא הריכוז. צריך לחלק בנפח התמיסה: 10L.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='q5HclConcNumber'){
    if(near(num,0.0167,0.00025) || near(num,0.017,0.0008)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.2,0.004)) return {kind:'err', html:'זה מספר המולים של יוני הידרוניום הדרושים, לא הריכוז. צריך לחלק בנפח תמיסת החומצה: 12L.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='q5ChlorideConcNumber'){
    if(near(num,0.00909,0.0002) || near(num,0.0091,0.00025) || near(num,0.009,0.00035)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.0167,0.0008) || near(num,0.017,0.001)) return {kind:'err', html:'נראה שחילקתם ב־12L בלבד. בתמיסה החדשה צריך לחלק בנפח הכולל: 10L + 12L = 22L.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='q5PressureNumber'){
    if(near(num,0.163,0.005) || near(num,0.16,0.01)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,2.44,0.08)) return {kind:'err', html:'נראה שהצבתם nRT אך לא חילקתם בנפח הכלי. במשוואת הגזים: P=nRT/V.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='q5MolarVolumeNumber'){
    if(near(num,150,0.5)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,24.5,0.8)) return {kind:'err', html:'24.5L/mol מתאים בערך לגז ב־1 אטמוספרה בטמפרטורת החדר. כאן התנאים הם של הכלי שבו נאסף הגז, ולכן משתמשים ב־15L וב־0.100 מול.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='q5HydrogenVolumeNumber'){
    if(near(num,60,0.2)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.4,0.02)) return {kind:'err', html:'זה מספר המולים של מימן הדרושים, לא הנפח. באותם תנאים יחס הנפחים של גזים שווה ליחס המולים.'};
    return numberRetryFeedback(q,attempts);
  }
  return numberRetryFeedback(q,attempts);
}

function checkStructured(q,values){
  const parts=[];
  if(q.checker==='oxidationStates'){
    const expected = [
      ['n_nh3','N ב־NH₃',-3],
      ['o_o2','O ב־O₂',0],
      ['n_no','N ב־NO',2],
      ['o_no','O ב־NO',-2],
      ['o_h2o','O ב־H₂O',-2]
    ];
    expected.forEach(([key,label,target])=&gt;{
      const num=parseNumber(values[key]);
      const ok=!isNaN(num) &amp;&amp; near(num,target,0.001);
      const targetText=target&gt;0?'+'+target:String(target).replace('-', '−');
      parts.push(part(label, ok?'ok':'err', ok?`נכון: ${label} = ${targetText}.`:`בדקו שוב את דרגת החמצון של ${label}.`));
    });
  }
  if(q.checker==='orderMetals'){
    const orderOk=orderLooksCorrect(values.order);

const state = loadState();
function loadState(){ 
  try{
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"q":{},"current":"intro"}');
    if(!parsed.q) parsed.q = {};
    if(!parsed.current) parsed.current = "intro";
    return parsed;
  }catch(e){return {q:{}, current:"intro"};} 
}
let saveTimer = null;
function markUnsaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='שומר...'; el.classList.remove('saved'); }
}
function markSaved(){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent='נשמר אוטומטית'; el.classList.add('saved'); }
}
function saveState(){ 
  try{
    markUnsaved();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); 
    clearTimeout(saveTimer);
    saveTimer=setTimeout(markSaved,180);
  } catch(e){
    const el=document.getElementById('saveStatus');
    if(el){ el.textContent='לא נשמר — ייתכן שהדפדפן חוסם שמירה מקומית'; el.classList.remove('saved'); }
  }
}
window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', ()=&gt;{ if(document.visibilityState==='hidden') saveState(); });
function getQState(id){ if(!state.q[id]) state.q[id]={}; return state.q[id]; }
function normalizeText(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function escapeHtml(s){ return String(s||'').replace(/[&amp;&lt;&gt;]/g,c=&gt;({'&amp;':'&amp;amp;','&lt;':'&amp;lt;','&gt;':'&amp;gt;'}[c])); }
function currentIndex(){
  return questions.findIndex(q=&gt;q.id===state.current);
}
function setCurrent(id){
  state.current = id;
  saveState();
  showCurrent();
}
function isQuestionAnswered(q){
  const s=getQState(q.id);
  if(q.type==='open') return !!((s.text||'').trim());
  if(q.type==='auto-choice-list') return !!(s.values &amp;&amp; s.values.choice);
  if(q.type==='auto-number') return !!(s.values &amp;&amp; String(s.values.number||'').trim());
  if(q.type==='auto-structured') return !!(s.values &amp;&amp; q.fields &amp;&amp; q.fields.every(f=&gt;String(s.values[f.key]||'').trim()));
  return false;
}
function isForwardTarget(target){
  const cur = currentIndex();
  const targetIndex = target === 'summary' ? questions.length : questions.findIndex(q=&gt;q.id===target);
  return cur &gt;= 0 &amp;&amp; targetIndex &gt; cur;
}
function showNavWarning(message){
  const box=document.getElementById('navWarning');
  if(!box) return;
  box.textContent=message;
  box.classList.remove('hidden');
  clearTimeout(window.__navWarningTimer);
  window.__navWarningTimer=setTimeout(()=&gt;box.classList.add('hidden'),4200);
}
function navigateTo(target){
  const curQ = questions.find(q=&gt;q.id===state.current);
  if(curQ &amp;&amp; isForwardTarget(target) &amp;&amp; !isQuestionAnswered(curQ)){
    showNavWarning('שימו לב: דילגתם על סעיף שלא נענה. אפשר לחזור אליו בהמשך, והוא יסומן בסיכום.');
  }
  setCurrent(target);
}
function scrollToCard(id){ navigateTo(id); }
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML = questions.map(q=&gt;`&lt;a href="#card-${q.id}" data-nav-id="${q.id}" onclick="event.preventDefault();navigateTo('${q.id}')"&gt;${q.id}&lt;/a&gt;`).join('') + `&lt;a href="#summaryCard" data-nav-id="summary" onclick="event.preventDefault();navigateTo('summary')"&gt;סיכום&lt;/a&gt;`;
}
function showCurrent(){
  const current = state.current || "intro";
  document.getElementById('intro')?.classList.toggle('paged-hidden', current !== "intro");
  document.getElementById('summaryCard')?.classList.toggle('paged-hidden', current !== "summary");
  questions.forEach(q=&gt;{
    const el=document.getElementById('card-'+q.id);
    if(el) el.classList.toggle('paged-hidden', current !== q.id);
  });
  document.querySelectorAll('#nav a').forEach(a=&gt;a.classList.toggle('active', a.dataset.navId===current));
  const activeNav=document.querySelector('#nav a.active');

  if(current==="summary") buildSummary();

  if(target){
    setTimeout(()=&gt;{target.scrollIntoView({behavior:'smooth', block:'start'}); target.focus?.({preventScroll:true});}, 30);
  }
}
function renderCards(){
  const root=document.getElementById('cards'); root.innerHTML='';

function renderPageControls(i){

function renderAuto(q){

  }

    const fields = q.fields.map(f=&gt;renderStructuredField(q,f)).join('');
    return `&lt;div class="structured-grid"&gt;${fields}&lt;/div&gt;&lt;div class="actions"&gt;&lt;button class="primary check-auto" data-qid="${q.id}" type="button"&gt;בדוק תשובה&lt;/button&gt;&lt;/div&gt;&lt;div class="feedback hidden" id="fb-${q.id}"&gt;&lt;/div&gt;`;

function hasOpenText(qid){ const ta=document.querySelector(`textarea[data-qid="${qid}"]`); return !!(ta &amp;&amp; ta.value.trim().length&gt;0); }

function checkAuto(qid){
  const q=questions.find(x=&gt;x.id===qid); const s=getQState(qid); let ok=false;

    const picked=document.querySelector(`input[name="choice-${qid}"]:checked`);
    if(!picked){

    const raw=document.querySelector(`input[data-qid="${qid}"][data-field="number"]`).value.trim();

    const num=parseNumber(raw); s.values={number:raw};

}
function parseNumber(raw){
  let s=String(raw||'').trim().replace(/[−–—]/g,'-').replace(/,/g,'.').replace(/×/g,'*').replace(/·/g,'*');

  sci=s.match(/(-?\d+(?:\.\d+)?)\s*\*?\s*10\s*(?:\^|\*\*)\s*(-?\d+)/i);
  if(sci) return parseFloat(sci[1])*Math.pow(10,parseInt(sci[2],10));
  const m=s.match(/-?\d+(?:\.\d+)?/);
  return m?parseFloat(m[0]):NaN;
}
function near(x,target,tol){ return Math.abs(x-target)&lt;=tol; }
function plain(s){ return String(s||'').toLowerCase().replace(/,/g,'.').replace(/\s+/g,''); }
function firstPosAny(text, aliases){
  let best=Infinity; aliases.forEach(a=&gt;{ const p=text.indexOf(a); if(p&gt;=0 &amp;&amp; p&lt;best) best=p; }); return best;
}
function orderLooksCorrect(raw){
  const t=plain(raw);
  const pZn=firstPosAny(t,['zn','אבץ']);
  const pCu=firstPosAny(t,['cu','נחושת']);
  const pAg=firstPosAny(t,['ag','כסף']);
  return Number.isFinite(pZn) &amp;&amp; Number.isFinite(pCu) &amp;&amp; Number.isFinite(pAg) &amp;&amp; pZn&lt;pCu &amp;&amp; pCu&lt;pAg;
}
function calcHasMgMoles(raw){
  const t=plain(raw);
  const hasMass = t.includes('0.7') || (t.includes('1.0') &amp;&amp; t.includes('0.3')) || (t.includes('1-0.3'));
  const hasMolar = t.includes('24.3') || t.includes('24');
  const hasDivide = t.includes('/') || t.includes('÷') || t.includes('m/m') || t.includes('n=');
  return hasMass &amp;&amp; hasMolar &amp;&amp; hasDivide;
}
function calcHasFeConc(raw){
  const t=plain(raw);
  const hasRatio = t.includes('2') &amp;&amp; (t.includes('0.0288') || t.includes('0.029') || t.includes('0.03') || t.includes('n(mg)'));
  const hasMoles = t.includes('0.0576') || (t.includes('2') &amp;&amp; (t.includes('0.0288') || t.includes('0.029')));
  const hasVol = t.includes('0.250') || t.includes('0.25') || t.includes('250ml') || t.includes('250מ');
  const hasC = t.includes('c=') || t.includes('n/v') || t.includes('0.0576/0.25') || t.includes('0.0576/0.250');
  return hasRatio &amp;&amp; hasMoles &amp;&amp; hasVol &amp;&amp; hasC;

function numberRetryFeedback(q,attempts){
  if(attempts===1) return {kind:'hint', html:`עדיין לא. רמז ראשון: ${q.hints[0]}`};
  if(attempts===2) return {kind:'hint', html:`עדיין לא. רמז שני: ${q.hints[1]}`};
  if(q.suppressFinalFeedback) return {kind:'err', html:'לא מדויק. בדקו שוב את החישוב, או עברו לסעיף החישוב הבא להשוואה.'};

}
function checkNumberWithWarnings(q,num,raw,attempts){

    if(near(num,0.0288,0.00015) || near(num,0.029,0.00055)){

    if(near(num,0.03,0.002)){
      return {kind:'warn', html:'התשובה מתקבלת, אבל זה עיגול גס. עדיף להשאיר 0.0288mol, או לכל היותר 0.029mol.'};
    }
    if(near(num,0.3,0.02)){
      return {kind:'warn', html:'התשובה מתקבלת עם הערה, אבל נראה שנשמט אפס אחרי הנקודה. החישוב נותן 0.0288mol, ולא 0.3mol.'};
    }
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='feConcentrationNumber'){
    if(near(num,0.2304,0.0005) || near(num,0.23,0.005)){
      return {kind:'ok', html:`נכון. ${q.final}`};
    }
    if(near(num,0.2,0.015)){
      return {kind:'warn', html:'התשובה מתקבלת, אבל זה עיגול יתר. עדיף לכתוב 0.2304M או 0.23M.'};
    }
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='balancedElectronsNumber'){
    if(near(num,20,0.05)) return {kind:'ok', html:`נכון. ${q.final}`};
    if(near(num,5,0.05)) return {kind:'err', html:'זיהיתם נכון שכל אטום N מאבד 5 אלקטרונים, אבל בתגובה המאוזנת יש 4 אטומי N. צריך להכפיל ב־4.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='oxygenMassNumber'){
    if(near(num,24,0.05)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.75,0.02)) return {kind:'err', html:'חישבתם כנראה את מספר המולים של O₂. הסעיף מבקש מסה בגרמים, לכן צריך לחשב גם מסה.'};
    return numberRetryFeedback(q,attempts);

    if(near(num,0.6,0.02)) return {kind:'err', html:'חישבתם כנראה את מספר המולים של NO. הסעיף מבקש מסה בגרמים, לכן צריך להכפיל ב־30 g/mol.'};
    if(near(num,16.2,0.1)) return {kind:'err', html:'זו מסת המים המתקבלים. בסעיף הזה התוצר המבוקש הוא NO.'};
    return numberRetryFeedback(q,attempts);
  }
  if(q.checker==='givenElectronsNumber'){

    return numberRetryFeedback(q,attempts);
  }

  if(q.checker==='q5SaltConcNumber'){
    if(near(num,0.0100,0.0002) || near(num,0.01,0.0002)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};

  if(q.checker==='q5HclConcNumber'){
    if(near(num,0.0167,0.00025) || near(num,0.017,0.0008)) return {kind:'ok', html: q.suppressFinalFeedback ? 'נכון.' : `נכון. ${q.final}`};
    if(near(num,0.2,0.004)) return {kind:'err', html:'זה מספר המולים של יוני הידרוניום הדרושים, לא הריכוז. צריך לחלק בנפח תמיסת החומצה: 12L.'};

    if(near(num,0.0167,0.0008) || near(num,0.017,0.001)) return {kind:'err', html:'נראה שחילקתם ב־12L בלבד. בתמיסה החדשה צריך לחלק בנפח הכולל: 10L + 12L = 22L.'};

      ['o_no','O ב־NO',-2],

    else if(!isNaN(num) &amp;&amp; near(num,0.3,0.02)){ status='warn'; msg='התקבל עם הערה, אבל שימו לב: זה עיגול יתר קיצוני מאוד. בדקו שלא נשמט אפס אחרי הנקודה; החישוב נותן 0.0288mol.'; }

    parts.push(part('תוצאה מספרית', status, msg));

    parts.push(part('חישוב', calcOk?'ok':'err', calcOk?'החישוב כולל את יחס המולים, מספר מולי Fe³⁺, המרת נפח לליטרים וחישוב ריכוז.':'בחישוב צריך להופיע n(Fe³⁺)=2·n(Mg)=0.0576mol, המרת 250mL ל־0.250L, ואז C=n/V.'));

    const co3ok=!isNaN(co3) &amp;&amp; (near(co3,0.0100,0.0002) || near(co3,0.01,0.0002));

  const finalBox = q.suppressFinalFeedback ? '' : `&lt;div class="example-box"&gt;&lt;b&gt;תשובה להשוואה:&lt;/b&gt; ${q.final}&lt;/div&gt;`;

function showFeedback(qid,kind,html){ const el=document.getElementById('fb-'+qid); if(!el) return; el.className='feedback '+(kind==='ok'?'ok':kind==='err'?'err':kind==='warn'?'warn':'hint'); el.innerHTML=html; el.classList.remove('hidden'); }
function openCheckCount(q,s){ return s.checks ? Object.values(s.checks).filter(Boolean).length : 0; }
function totalOpenChecks(q){ return Array.isArray(q.checks) ? q.checks.length : 0; }
function openStatus(q,s){ if(!(s.text||'').trim()) return 'לא נכתבה תשובה'; if(!s.answerShown) return 'נכתבה תשובה, טרם הוצג מענה להשוואה'; if(!s.assessment) return 'הוצג מענה להשוואה, טרם סומנה הערכה'; return 'הושלם'; }
function autoStatusHeb(s){ if(!s||!s.lastFeedback) return 'לא נבדק'; if(s.lastFeedback.kind==='ok') return `נכון${s.correctAttempt?` בניסיון ${s.correctAttempt}`:''}`; if(s.lastFeedback.kind==='warn') return 'נכון עם הערת עיגול / דיוק'; if(s.lastFeedback.kind==='err') return 'דורש תיקון'; return 'קיבל/ה רמז'; }
function qShortTitle(q){ return q.title; }
function assessmentHeb(v){ return v==='full'?'מלאה':v==='partial'?'חלקית':v==='wrong'?'לא נכונה / לא ידעתי':'לא סומנה'; }
function flagsForQuestion(q,s){ const flags=[]; if(q.type==='open'){ const text=(s.text||'').trim(); const checked=openCheckCount(q,s), total=totalOpenChecks(q); if(!text) flags.push('לא נכתבה תשובה'); if(text&amp;&amp;!s.answerShown) flags.push('לא הוצג מענה להשוואה'); if(s.answerShown&amp;&amp;total&amp;&amp;checked&lt;Math.ceil(total/2)) flags.push('פחות מחצי מסעיפי הבדיקה סומנו'); if(s.assessment==='partial') flags.push('סומן חלקי'); if(s.assessment==='wrong') flags.push('סומן לא נכון / לא ידעתי'); } else { if(!s.lastFeedback) flags.push('לא נבדק'); if(s.lastFeedback&amp;&amp;s.lastFeedback.kind==='warn') flags.push('התקבל עם הערה'); if(s.lastFeedback&amp;&amp;s.lastFeedback.kind==='err') flags.push('דורש תיקון'); if((s.attempts||0)&gt;=3) flags.push('3 ניסיונות'); } return flags; }
function buildSummary(){
  const autoQs=questions.filter(q=&gt;q.type!=='open'), openQs=questions.filter(q=&gt;q.type==='open');
  const autoDone=autoQs.filter(q=&gt;getQState(q.id).lastFeedback).length, autoCorrect=autoQs.filter(q=&gt;getQState(q.id).lastFeedback?.kind==='ok').length, autoFirst=autoQs.filter(q=&gt;getQState(q.id).lastFeedback?.kind==='ok' &amp;&amp; (getQState(q.id).correctAttempt||getQState(q.id).attempts)===1).length;
  const openAnswered=openQs.filter(q=&gt;(getQState(q.id).text||'').trim()).length;
  const full=openQs.filter(q=&gt;getQState(q.id).assessment==='full').length, partial=openQs.filter(q=&gt;getQState(q.id).assessment==='partial').length, wrong=openQs.filter(q=&gt;getQState(q.id).assessment==='wrong').length;
  const flags=[]; questions.forEach(q=&gt;{ const fs=flagsForQuestion(q,getQState(q.id)); if(fs.length) flags.push({id:q.id,title:qShortTitle(q),flags:fs}); });
  const unanswered = questions.filter(q=&gt;!isQuestionAnswered(q)).map(q=&gt;`${q.id} — ${qShortTitle(q)}`);
  document.getElementById('studentSummary').innerHTML=`&lt;div class="summary-kpis"&gt;&lt;div class="kpi"&gt;&lt;b&gt;${autoDone}/${autoQs.length}&lt;/b&gt;שאלות אוטומטיות נבדקו&lt;/div&gt;&lt;div class="kpi"&gt;&lt;b&gt;${autoCorrect}&lt;/b&gt;שאלות אוטומטיות נכונות&lt;/div&gt;&lt;div class="kpi"&gt;&lt;b&gt;${autoFirst}&lt;/b&gt;נכונות בניסיון ראשון&lt;/div&gt;&lt;div class="kpi"&gt;&lt;b&gt;${openAnswered}/${openQs.length}&lt;/b&gt;שאלות פתוחות עם תשובה&lt;/div&gt;&lt;div class="kpi"&gt;&lt;b&gt;${unanswered.length}&lt;/b&gt;סעיפים ללא מענה&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;b&gt;הערכה עצמית בפתוחות:&lt;/b&gt; מלאה: ${full} · חלקית: ${partial} · לא נכונה/לא ידעתי: ${wrong} · טרם סומנה: ${openQs.length-full-partial-wrong}&lt;/p&gt;${unanswered.length?`&lt;p&gt;&lt;b&gt;לא עניתם על:&lt;/b&gt;&lt;/p&gt;&lt;ul class="flag-list"&gt;${unanswered.map(x=&gt;`&lt;li&gt;${x}&lt;/li&gt;`).join('')}&lt;/ul&gt;`:'&lt;p&gt;&lt;span class="ok-chip"&gt;עניתם על כל הסעיפים.&lt;/span&gt;&lt;/p&gt;'}&lt;p&gt;&lt;b&gt;כדאי לחזור על:&lt;/b&gt;&lt;/p&gt;${flags.length?`&lt;ul class="flag-list"&gt;${flags.slice(0,8).map(f=&gt;`&lt;li&gt;&lt;b&gt;${f.id}&lt;/b&gt; — ${f.title}: ${f.flags.join(' · ')}&lt;/li&gt;`).join('')}&lt;/ul&gt;`:'&lt;p&gt;&lt;span class="ok-chip"&gt;אין סעיפים שסומנו לחזרה כרגע.&lt;/span&gt;&lt;/p&gt;'}`;

  document.getElementById('teacherSummaryTable').innerHTML=`&lt;thead&gt;&lt;tr&gt;&lt;th&gt;סעיף&lt;/th&gt;&lt;th&gt;סוג&lt;/th&gt;&lt;th&gt;סטטוס&lt;/th&gt;&lt;th&gt;כיוון נפתח?&lt;/th&gt;&lt;th&gt;בדיקה עצמית&lt;/th&gt;&lt;th&gt;הערכה עצמית&lt;/th&gt;&lt;th&gt;דגלים&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows}&lt;/tbody&gt;`;
  document.getElementById('summaryContent').innerHTML=questions.map(q=&gt;{ const s=getQState(q.id); if(q.type==='open'){ const checked=(s.checks?Object.entries(s.checks).filter(([i,v])=&gt;v).map(([i])=&gt;`${Number(i)+1}. ${q.checks[Number(i)]}`):[]); return `&lt;div class="summary-item"&gt;&lt;b&gt;${q.id} ${qShortTitle(q)}&lt;/b&gt;&lt;br&gt;תשובה: ${escapeHtml((s.text||'').slice(0,1000)) || '&lt;span class="small"&gt;לא נכתבה&lt;/span&gt;'}&lt;br&gt;פתח/ה כיוון: ${s.directionShown?'כן':'לא'} · הציג/ה מענה להשוואה: ${s.answerShown?'כן':'לא'}&lt;br&gt;בדיקה עצמית שסומנה:&lt;br&gt;${checked.length?checked.map(x=&gt;`• ${escapeHtml(x)}`).join('&lt;br&gt;'):'&lt;span class="small"&gt;לא סומן&lt;/span&gt;'}&lt;br&gt;הערכה עצמית: ${assessmentHeb(s.assessment)}&lt;/div&gt;`; } return `&lt;div class="summary-item"&gt;&lt;b&gt;${q.id} ${qShortTitle(q)}&lt;/b&gt;&lt;br&gt;סטטוס: ${autoStatusHeb(s)} · ניסיונות: ${s.attempts||0}&lt;br&gt;תשובות: ${s.values?escapeHtml(Object.entries(s.values).map(([k,v])=&gt;`${k}: ${v}`).join(' | ')):'לא נכתב'}&lt;/div&gt;`; }).join('');
}
function buildPlainSummary(){ const lines=['דוח למורה — שאלה פתוחה 6','']; questions.forEach(q=&gt;{ const s=getQState(q.id); lines.push(`${q.id} ${qShortTitle(q)}`); if(q.type==='open'){ const checked=(s.checks?Object.entries(s.checks).filter(([i,v])=&gt;v).map(([i])=&gt;`${Number(i)+1}. ${q.checks[Number(i)]}`):[]); lines.push('סוג: פתוחה'); lines.push(`סטטוס: ${openStatus(q,s)}`); lines.push(`כיוון נפתח: ${s.directionShown?'כן':'לא'}`); lines.push(`הערכת תלמיד/ה: ${assessmentHeb(s.assessment)}`); lines.push(`בדיקה עצמית שסומנה: ${checked.join(' | ')||'לא סומן'}`); lines.push(`תשובת התלמיד/ה: ${s.text||''}`); } else { lines.push('סוג: אוטומטית'); lines.push(`סטטוס: ${autoStatusHeb(s)}`); lines.push(`ניסיונות: ${s.attempts||0}`); lines.push(`תשובות: ${s.values?Object.entries(s.values).map(([k,v])=&gt;`${k}: ${v}`).join(' | '):'לא נכתב'}`); } lines.push('---'); }); return lines.join('\n'); }

  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}
  .kpi b{display:block;font-size:1.35rem;color:#1d4ed8}
  iframe.hidden-loader{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;top:-9999px}
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;header&gt;&lt;div class="wrap"&gt;&lt;h1&gt;סיכום למורה — כל דף העבודה&lt;/h1&gt;&lt;/div&gt;&lt;/header&gt;
&lt;main&gt;
  &lt;section class="card"&gt;
    &lt;p&gt;כאן מרוכז הדוח היחיד למורה עבור כל דף העבודה.&lt;/p&gt;
    &lt;div&gt;
      &lt;button type="button" id="refreshReport"&gt;רענן סיכום&lt;/button&gt;
      &lt;button type="button" class="secondary" id="copyReport"&gt;העתק דוח למורה&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class="status small" id="status"&gt;הסיכום ייבנה לפי התשובות השמורות בדפדפן.&lt;/div&gt;
    &lt;div class="kpis" id="kpis"&gt;&lt;/div&gt;
  &lt;/section&gt;
  &lt;section class="card"&gt;
    &lt;h2&gt;דוח מפורט&lt;/h2&gt;
    &lt;div class="report-box" id="reportBox"&gt;לחצו על “רענן סיכום”.&lt;/div&gt;
  &lt;/section&gt;
&lt;/main&gt;
&lt;script&gt;
const MODULES = [
  {key:'mc', label:'רבות־ברירה'},
  {key:'q1', label:'שאלה 1'},
  {key:'q2', label:'שאלה 2'},
  {key:'q3', label:'שאלה 3'},
  {key:'q4', label:'שאלה 4'},
  {key:'q5', label:'שאלה 5'},
  {key:'q6', label:'שאלה 6'}
];
function stripHtml(html){
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.textContent || div.innerText || '').replace(/\s+/g,' ').trim();
}
function valText(v){
  if(v === undefined || v === null || v === '') return 'לא נכתב';
  if(typeof v === 'object') return Object.entries(v).map(([k,x])=&gt;`${k}: ${x}`).join(' | ') || 'לא נכתב';
  return String(v);
}
function calcStats(items){
  const stats = {
    total:0, answered:0,
    autoTotal:0, autoAnswered:0, autoCorrect:0, autoWarn:0, autoIncorrect:0, autoUnanswered:0,
    openTotal:0, openAnswered:0, selfFull:0, selfPartial:0, selfWrong:0, selfBlank:0
  };
  for(const item of items){
    stats.total++;
    if(item.kind === 'open'){
      stats.openTotal++;
      if(item.answered) stats.openAnswered++;
      if(item.answered) stats.answered++;
      if(item.assessmentRaw === 'full') stats.selfFull++;
      else if(item.assessmentRaw === 'partial') stats.selfPartial++;
      else if(item.assessmentRaw === 'wrong') stats.selfWrong++;
      else stats.selfBlank++;
    } else {
      stats.autoTotal++;
      if(item.answered) { stats.autoAnswered++; stats.answered++; }
      if(item.result === 'correct') stats.autoCorrect++;
      else if(item.result === 'warn') stats.autoWarn++;
      else if(item.result === 'incorrect') stats.autoIncorrect++;
      else stats.autoUnanswered++;
    }
  }
  return stats;
}
function mergeStats(a,b){ Object.keys(a).forEach(k=&gt;a[k]+=b[k]||0); return a; }
function statusFromAutoKind(kind){
  if(kind === 'ok') return 'נכון';
  if(kind === 'warn') return 'נכון עם הערת דיוק';
  if(kind === 'err') return 'לא נכון / דורש תיקון';
  return 'לא נבדק';
}
function loadModuleData(mod){
  return new Promise(resolve=&gt;{
    const holder = parent.document.getElementById('src-' + mod.key);
    if(!holder) return resolve({label:mod.label, items:[], detail:`${mod.label}\nלא נמצא מקור הפרק.`});
    const frame = document.createElement('iframe');
    frame.className = 'hidden-loader';
    let done = false;
    const finish = (data) =&gt; {
      if(done) return; done = true;
      try{ frame.remove(); }catch(e){}
      resolve(data);
    };
    frame.onload = () =&gt; setTimeout(()=&gt;{
      try{
        const w = frame.contentWindow;
        if(mod.key === 'mc'){
          const data = w.eval(`(function(){
            const items = MC_QUESTIONS.map(function(q,idx){
              const s = getQState(q.id);
              return {
                module:'רבות־ברירה', kind:'mc', id:String(idx+1), title:q.title,
                selected:s.selected, selectedLetter:selectedLetter(q.id, s.selected),
                selectedHtml:(s.selected===null||s.selected===undefined)?'':q.options[s.selected],
                attempts:s.attempts||0, completed:!!s.completed, correct:!!s.correct,
                answered:(s.selected!==null &amp;&amp; s.selected!==undefined) || (s.attempts||0)&gt;0,
                result:s.correct?'correct':(((s.selected!==null &amp;&amp; s.selected!==undefined)||(s.attempts||0)&gt;0)?'incorrect':'unanswered')
              };
            });
            return {label:'רבות־ברירה', studentName:state.studentName||'', schoolName:state.schoolName||'', items:items};
          })()`);
          const lines = ['רבות־ברירה'];
          if(data.studentName) lines.push('שם התלמיד/ה: ' + data.studentName);
          if(data.schoolName) lines.push('בית הספר: ' + data.schoolName);
          data.items.forEach(item=&gt;{
            const opt = stripHtml(item.selectedHtml);
            const selected = item.selectedLetter ? `${item.selectedLetter}${opt ? ' — ' + opt : ''}` : 'לא סומנה תשובה';
            const status = item.correct ? 'נכון' : (item.answered ? 'לא נכון / לא הושלם כנכון' : 'לא נענה');
            lines.push(`שאלה ${item.id} — ${item.title}`);
            lines.push(`תשובת התלמיד/ה: ${selected}`);
            lines.push(`ניסיונות: ${item.attempts}; סטטוס: ${status}`);
            lines.push('---');
          });
          data.detail = lines.join('\n');
          return finish(data);
        }
        const data = w.eval(`(function(){
          function valuesTextFor(q,s){
            if(!s.values) return 'לא נכתב';
            if(q.type === 'choice'){
              const v = s.values.choice;
              const opt = (q.options||[]).find(function(o){ return o[0] === v; });
              return opt ? opt[1] : (v || 'לא נכתב');
            }
            if(q.type === 'number') return s.values.number || 'לא נכתב';
            if(q.fields){
              return q.fields.map(function(f){ return (f.label||f.key) + ': ' + (s.values[f.key] || 'לא נכתב'); }).join(' | ');
            }
            return Object.entries(s.values).map(function(p){ return p[0] + ': ' + p[1]; }).join(' | ') || 'לא נכתב';
          }
          const items = questions.map(function(q){
            const s = getQState(q.id);
            const isOpen = q.type === 'open';
            const fbKind = s.lastFeedback &amp;&amp; s.lastFeedback.kind;
            return {
              module: document.title || '', kind:isOpen?'open':'auto', id:q.id, title:qShortTitle(q),
              text:s.text||'', values:valuesTextFor(q,s), attempts:s.attempts||0,
              answerShown:!!s.answerShown, directionShown:!!s.directionShown,
              assessmentRaw:s.assessment||'', assessment:assessmentHeb(s.assessment),
              checkedCount:isOpen?openCheckCount(q,s):0, totalChecks:isOpen?totalOpenChecks(q):0,
              answered:isOpen?!!(s.text||'').trim():!!s.lastFeedback,
              result:isOpen?'open':(fbKind==='ok'?'correct':(fbKind==='warn'?'warn':(fbKind==='err'?'incorrect':'unanswered'))),
              status:isOpen?openStatus(q,s):autoStatusHeb(s)
            };
          });
          return {label:document.querySelector('h1')?document.querySelector('h1').textContent:'', items:items, plain:(typeof buildPlainSummary==='function'?buildPlainSummary():'')};
        })()`);
        const lines = [mod.label];
        data.items.forEach(item=&gt;{
          lines.push(`${item.id} — ${item.title}`);
          if(item.kind === 'open'){
            lines.push(`סוג: פתוחה; סטטוס: ${item.status}`);
            lines.push(`תשובת התלמיד/ה: ${item.text || 'לא נכתבה תשובה'}`);
            lines.push(`כיוון נפתח: ${item.directionShown?'כן':'לא'}; מענה להשוואה הוצג: ${item.answerShown?'כן':'לא'}`);
            lines.push(`בדיקה עצמית: ${item.checkedCount}/${item.totalChecks}; הערכה עצמית: ${item.assessment}`);
          } else {
            lines.push(`סוג: בדיקה אוטומטית; סטטוס: ${item.status}; ניסיונות: ${item.attempts}`);
            lines.push(`תשובת התלמיד/ה: ${stripHtml(item.values) || 'לא נכתבה תשובה'}`);
          }
          lines.push('---');
        });
        data.detail = lines.join('\n');
        finish(data);
      }catch(e){
        finish({label:mod.label, items:[], detail:`${mod.label}\nשגיאה בבניית הדוח: ${e.message}`});
      }
    }, 180);
    document.body.appendChild(frame);
    frame.srcdoc = holder.value;
    setTimeout(()=&gt;finish({label:mod.label, items:[], detail:`${mod.label}\nהדוח לא נטען בזמן.`}), 5000);
  });
}
function kpisHtml(stats){
  return `
    &lt;div class="kpi"&gt;&lt;b&gt;${stats.answered}/${stats.total}&lt;/b&gt;סעיפים שנענו או נבדקו&lt;/div&gt;
    &lt;div class="kpi"&gt;&lt;b&gt;${stats.autoCorrect}&lt;/b&gt;נכון בבדיקה אוטומטית&lt;/div&gt;
    &lt;div class="kpi"&gt;&lt;b&gt;${stats.autoWarn}&lt;/b&gt;נכון עם הערת דיוק&lt;/div&gt;
    &lt;div class="kpi"&gt;&lt;b&gt;${stats.autoIncorrect}&lt;/b&gt;לא נכון / דורש תיקון&lt;/div&gt;
    &lt;div class="kpi"&gt;&lt;b&gt;${stats.openAnswered}/${stats.openTotal}&lt;/b&gt;סעיפים פתוחים שנענו&lt;/div&gt;
  `;
}
function statsText(stats){
  return [
    'סיכום כמותי',
    `סעיפים שנענו או נבדקו: ${stats.answered} מתוך ${stats.total}`,
    `בדיקות אוטומטיות: נכון ${stats.autoCorrect}; נכון עם הערת דיוק ${stats.autoWarn}; לא נכון / דורש תיקון ${stats.autoIncorrect}; טרם נבדק ${stats.autoUnanswered}`,
    `סעיפים פתוחים: נענו ${stats.openAnswered} מתוך ${stats.openTotal}`,
    `הערכה עצמית בסעיפים פתוחים: מלאה ${stats.selfFull}; חלקית ${stats.selfPartial}; לא נכונה / לא ידעתי ${stats.selfWrong}; לא סומנה ${stats.selfBlank}`
  ].join('\n');
}
async function buildReport(){
  const status = document.getElementById('status');
  status.textContent = 'בונה סיכום...';
  const allItems = [];
  const chunks = [];
  let studentName = '', schoolName = '';
  for(const mod of MODULES){
    const data = await loadModuleData(mod);
    if(data.studentName) studentName = data.studentName;
    if(data.schoolName) schoolName = data.schoolName;
    allItems.push(...(data.items||[]));
    chunks.push(data.detail || `${mod.label}\nלא נוצר דוח.`);
    chunks.push('==============================');
  }
  const stats = calcStats(allItems);
  document.getElementById('kpis').innerHTML = kpisHtml(stats);
  const header = [];
  header.push('דוח למורה — עבודת קיץ מסכמת לכיתה י״א בכימיה');
  if(studentName) header.push('שם התלמיד/ה: ' + studentName);
  if(schoolName) header.push('בית הספר: ' + schoolName);
  header.push('נוצר בתאריך: ' + new Date().toLocaleString('he-IL'));
  header.push('');
  header.push(statsText(stats));
  header.push('');
  header.push('פירוט תשובות התלמיד/ה');
  header.push('==============================');
  const report = header.concat(chunks).join('\n');
  document.getElementById('reportBox').textContent = report;
  status.textContent = 'הסיכום עודכן. הדוח כולל את תשובות התלמיד/ה ואת הסיכום הכמותי.';
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly','');
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.right = '0';
  ta.style.width = '2px';
  ta.style.height = '2px';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){ ok = false; }
  ta.remove();
  return ok;
}
async function copyReport(){
  const text = document.getElementById('reportBox').textContent || '';
  if(!text.trim() || text.includes('לחצו על')) await buildReport();
  const fresh = document.getElementById('reportBox').textContent || '';
  try{
    if(navigator.clipboard &amp;&amp; window.isSecureContext){
      await navigator.clipboard.writeText(fresh);
      document.getElementById('status').textContent = 'הדוח הועתק ללוח.';
      return;
    }
  }catch(e){}
  if(fallbackCopy(fresh)){
    document.getElementById('status').textContent = 'הדוח הועתק ללוח.';
  } else {
    const box = document.getElementById('reportBox');
    const range = document.createRange();
    range.selectNodeContents(box);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.getElementById('status').textContent = 'העתקה אוטומטית לא הצליחה. הדוח סומן — אפשר להעתיק ידנית בעזרת Ctrl+C.';
  }
}
document.getElementById('refreshReport').addEventListener('click', buildReport);
document.getElementById('copyReport').addEventListener('click', copyReport);
buildReport();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;</textarea>
<script>
(function(){
  const frame = document.getElementById('moduleFrame');
  const buttons = Array.from(document.querySelectorAll('.module-tab'));
  function loadModule(key){
    buttons.forEach(b=>b.classList.toggle('active', b.dataset.module===key));
    const holder = document.getElementById('src-' + key);
    if(!holder) return;
    frame.title = buttons.find(b=>b.dataset.module===key)?.textContent || 'פרק העבודה';
    frame.srcdoc = holder.value;
    try { localStorage.setItem('chem_final_current_module_v3', key); } catch(e) {}
    window.scrollTo({top:0, behavior:'smooth'});
  }
  buttons.forEach(btn=>btn.addEventListener('click',()=>loadModule(btn.dataset.module)));
  let start = 'mc';
  try { start = localStorage.getItem('chem_final_current_module_v3') || start; } catch(e) {}
  if(!document.getElementById('src-' + start)) start = 'mc';
  loadModule(start);
})();
</script>
